# Spike 11.0: Cloud Run-to-Cloud Run auth — builds + deploys two services.
#
# Ordering: callee deploys first so we can pass its public URL into the caller
# as CALLEE_URL and ALLOWED_CALLERS. The caller can't be deployed first because
# its env vars reference the callee's URL.
#
# Service accounts (spike-caller-sa, spike-callee-sa) must already exist —
# create them via the gcloud commands documented in the spike README. Same for
# the run.invoker grant from caller SA to the callee service; we can't make it
# inside this build because the callee service doesn't exist on the first run.
# An optional `_GRANT_INVOKER` step at the end re-asserts the grant idempotently.
#
# Cloud Build does NOT recursively expand substitutions inside other
# substitutions' values — built-ins like $PROJECT_ID stay literal if nested
# inside a user-defined sub. Inline $PROJECT_ID directly instead.
substitutions:
  _TAG: 'manual'
  _CALLER_SA: 'spike-caller-sa@driftscribe-hack-2026.iam.gserviceaccount.com'
  _CALLEE_SA: 'spike-callee-sa@driftscribe-hack-2026.iam.gserviceaccount.com'

steps:
  # ---- Build images ----
  - id: build-callee
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - asia-northeast1-docker.pkg.dev/$PROJECT_ID/driftscribe/spike-callee:${_TAG}
      - -f
      - spikes/cloud_run_auth/callee/Dockerfile
      - spikes/cloud_run_auth/callee
  - id: build-caller
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - asia-northeast1-docker.pkg.dev/$PROJECT_ID/driftscribe/spike-caller:${_TAG}
      - -f
      - spikes/cloud_run_auth/caller/Dockerfile
      - spikes/cloud_run_auth/caller

  # ---- Push images ----
  - id: push-callee
    name: gcr.io/cloud-builders/docker
    args: ['push', 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/driftscribe/spike-callee:${_TAG}']
    waitFor: ['build-callee']
  - id: push-caller
    name: gcr.io/cloud-builders/docker
    args: ['push', 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/driftscribe/spike-caller:${_TAG}']
    waitFor: ['build-caller']

  # ---- Deploy callee first (we need its URL for the caller's env) ----
  - id: deploy-callee
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        # Deploy with a placeholder OWN_URL — Cloud Run only learns the URL on
        # first deploy, so we deploy once, read the URL back, then update.
        # (Subsequent re-deploys see the same URL and the second `update` is a
        # no-op metadata write. Cheap.)
        gcloud run deploy spike-callee \
          --image=asia-northeast1-docker.pkg.dev/$PROJECT_ID/driftscribe/spike-callee:${_TAG} \
          --region=asia-northeast1 \
          --service-account=${_CALLEE_SA} \
          --no-allow-unauthenticated \
          --min-instances=0 \
          --max-instances=1 \
          --concurrency=1 \
          --set-env-vars=OWN_URL=https://placeholder,ALLOWED_CALLERS=${_CALLER_SA}

        CALLEE_URL=$$(gcloud run services describe spike-callee \
          --region=asia-northeast1 --format='value(status.url)')
        echo "Callee URL: $$CALLEE_URL"

        # Re-set OWN_URL to the actual URL the service was assigned.
        gcloud run services update spike-callee \
          --region=asia-northeast1 \
          --update-env-vars=OWN_URL=$$CALLEE_URL

        # Stash for the next step.
        echo -n "$$CALLEE_URL" > /workspace/callee_url.txt
    waitFor: ['push-callee']

  # NOTE: granting roles/run.invoker on the callee to the caller SA is done
  # OUT-OF-BAND by the operator (one-line gcloud command in the README). Cloud
  # Build's default service account (compute@developer.gserviceaccount.com)
  # only has `roles/editor`, which does NOT include the `run.setIamPolicy`
  # permission needed for `gcloud run services add-iam-policy-binding`. Rather
  # than grant `roles/run.admin` to the build SA just to cover an idempotent
  # one-time grant, the README documents it as a prerequisite step.

  # ---- Deploy caller with CALLEE_URL pointing at the just-deployed callee ----
  - id: deploy-caller
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        CALLEE_URL=$$(cat /workspace/callee_url.txt)
        echo "Wiring caller to CALLEE_URL=$$CALLEE_URL"
        gcloud run deploy spike-caller \
          --image=asia-northeast1-docker.pkg.dev/$PROJECT_ID/driftscribe/spike-caller:${_TAG} \
          --region=asia-northeast1 \
          --service-account=${_CALLER_SA} \
          --allow-unauthenticated \
          --min-instances=0 \
          --max-instances=1 \
          --concurrency=1 \
          --set-env-vars=CALLEE_URL=$$CALLEE_URL

        CALLER_URL=$$(gcloud run services describe spike-caller \
          --region=asia-northeast1 --format='value(status.url)')
        echo "Caller URL: $$CALLER_URL"
    waitFor: ['push-caller', 'deploy-callee']

images:
  - asia-northeast1-docker.pkg.dev/$PROJECT_ID/driftscribe/spike-caller:${_TAG}
  - asia-northeast1-docker.pkg.dev/$PROJECT_ID/driftscribe/spike-callee:${_TAG}
