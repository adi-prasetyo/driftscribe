name: e2e

on:
  workflow_dispatch:
    inputs:
      python_e2e:
        description: "Run Python E2E tests"
        type: boolean
        default: true
      ui_e2e:
        description: "Run Playwright UI tests"
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write

# Concurrency guard: the suite mutates shared Cloud Run + Firestore state
# in driftscribe-e2e (env vars on payment-demo-e2e, decisions/events
# collections). Allowing parallel dispatches would race the per-test
# baseline guard fixture and corrupt other-in-flight runs' results.
# cancel-in-progress=false: a second dispatch queues until the first
# finishes rather than terminating it mid-run (cancelling mid-run can
# leave Cloud Run revisions or Firestore claims in a stuck state).
concurrency:
  group: driftscribe-e2e
  cancel-in-progress: false

jobs:
  python-e2e:
    # L1 (defense-in-depth): this job mints WIF credentials for driftscribe-e2e,
    # so gate it to a workflow_dispatch on THIS repo (a fork can never satisfy
    # github.repository). e2e has no pull_request trigger, so there is no
    # fork-PR path to guard; the repository pin + dispatch check are the
    # workflow-side belt-and-braces mirroring iac.yml's auth gate.
    if: ${{ github.event_name == 'workflow_dispatch' && github.repository == 'adi-prasetyo/driftscribe' && github.event.inputs.python_e2e == 'true' }}
    runs-on: ubuntu-latest
    environment: e2e
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with: { python-version: "3.12" }
      - uses: google-github-actions/auth@b7593ed2efd1c1617e1b0254da33b86225adb2a5 # v2.1.7
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_E2E_RUNNER_SA }}
      - uses: google-github-actions/setup-gcloud@77e7a554d41e2ee56fc945c52dfd3f33d12def9a # v2.1.4
      - name: Install deps
        run: |
          pip install uv
          uv sync --all-extras
      - name: Resolve coordinator URL + tokens
        id: env
        run: |
          URL=$(gcloud run services describe driftscribe-agent \
            --project driftscribe-e2e --region asia-northeast1 \
            --format='value(status.url)')
          TOKEN=$(gcloud secrets versions access latest \
            --secret=coordinator-shared-token --project driftscribe-e2e)
          GH_TOKEN=$(gcloud secrets versions access latest \
            --secret=upgrade-docs-github-pat --project driftscribe-e2e)
          echo "::add-mask::$TOKEN"
          echo "::add-mask::$GH_TOKEN"
          echo "url=$URL"             >> "$GITHUB_OUTPUT"
          echo "token=$TOKEN"         >> "$GITHUB_OUTPUT"
          echo "gh_token=$GH_TOKEN"   >> "$GITHUB_OUTPUT"
      - name: Run Python E2E
        env:
          DRIFTSCRIBE_E2E_URL: ${{ steps.env.outputs.url }}
          DRIFTSCRIBE_E2E_TOKEN: ${{ steps.env.outputs.token }}
          DRIFTSCRIBE_E2E_GITHUB_TOKEN: ${{ steps.env.outputs.gh_token }}
          DRIFTSCRIBE_E2E_PROJECT: driftscribe-e2e
        run: uv run pytest tests/e2e -m e2e -v --junitxml=e2e-results.xml
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with: { name: e2e-python-results, path: e2e-results.xml }

  ui-e2e:
    # always() keeps this running even if python-e2e was skipped/failed; the
    # same L1 dispatch + repository pin as python-e2e (this job also mints WIF).
    if: ${{ always() && github.event_name == 'workflow_dispatch' && github.repository == 'adi-prasetyo/driftscribe' && github.event.inputs.ui_e2e == 'true' }}
    needs: python-e2e
    runs-on: ubuntu-latest
    environment: e2e
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with: { node-version: "20" }
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-v1
      - uses: google-github-actions/auth@b7593ed2efd1c1617e1b0254da33b86225adb2a5 # v2.1.7
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_E2E_RUNNER_SA }}
      - uses: google-github-actions/setup-gcloud@77e7a554d41e2ee56fc945c52dfd3f33d12def9a # v2.1.4
      - name: Install Playwright
        working-directory: tests/e2e/ui
        run: |
          npm install
          npx playwright install --with-deps chromium
      - name: Resolve env
        id: env
        run: |
          URL=$(gcloud run services describe driftscribe-agent \
            --project driftscribe-e2e --region asia-northeast1 \
            --format='value(status.url)')
          TOKEN=$(gcloud secrets versions access latest \
            --secret=coordinator-shared-token --project driftscribe-e2e)
          echo "::add-mask::$TOKEN"
          echo "url=$URL"     >> "$GITHUB_OUTPUT"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"
      - name: Run UI E2E
        working-directory: tests/e2e/ui
        env:
          DRIFTSCRIBE_E2E_URL: ${{ steps.env.outputs.url }}
          DRIFTSCRIBE_E2E_TOKEN: ${{ steps.env.outputs.token }}
        run: npm test
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: e2e-ui-results
          path: tests/e2e/ui/playwright-report/
