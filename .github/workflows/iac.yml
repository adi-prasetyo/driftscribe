name: iac

# Static gate + tofu fmt/validate for the OpenTofu `iac/` layer (Phase A).
#
# Safety (design Â§11.8): triggered on `pull_request` only â€” NEVER
# `pull_request_target`, which would run PR-controlled code with repo
# secrets. This workflow needs no GCP credentials: it is a purely static
# check (HCL gate + `tofu init -backend=false` + fmt + validate). There is
# deliberately NO `tofu plan` step in Phase A â€” a meaningful plan needs live
# GCP creds/API access this workflow does not (and must not) have; the
# authoritative WIF-authenticated plan is Phase C.
#
# Actions are pinned to commit SHAs (with a trailing version comment) per
# Task 10 of docs/plans/2026-05-27-infra-iac-phase-a.md. ci.yml currently
# pins to floating major tags; this workflow intentionally pins tighter
# because it gates infrastructure changes.

on:
  pull_request:
    # Include labeled/unlabeled so adding/removing the `driftscribe-infra` label
    # (which flips the gate between operator and agent mode in "Derive gate mode")
    # reruns the check; the default activity types omit label events.
    types: [opened, synchronize, reopened, labeled, unlabeled]
    # NO `paths:` filter â€” intentional. This workflow runs on EVERY pull request
    # so it can be promoted to a *required* status check in branch protection.
    # A path-filtered workflow never reports a status on PRs that don't touch
    # the path, so GitHub would block such PRs forever if the check were
    # required. Running always is cheap and safe: on a PR that touches no
    # `iac/` files the static gate sees an empty in-scope diff and passes
    # (operator mode treats non-`iac/` paths as out-of-scope â€” see
    # tools/iac_static_gate.py and test_operator_mode_still_governs_only_iac),
    # and `tofu init -backend=false`/fmt/validate just re-checks the unchanged
    # `iac/` tree. (agent mode still rejects non-`iac/` paths, but only `infra/`
    # branches / `driftscribe-infra`-labeled PRs run in agent mode, and those
    # are iac-only by design.)
  workflow_dispatch:
    # Phase C2 plan-builder trigger. The WIF OIDC condition (provisioned by
    # infra/scripts/setup_iac_backend.sh Â§6) admits ONLY push-to-main and
    # workflow_dispatch from this exact workflow file. pull_request is
    # excluded so fork PRs never obtain GCP credentials (design Â§11.8).
    # Operator-initiated: maintainer clicks "Run workflow" with the PR number.
    inputs:
      pr_number:
        description: 'PR number to plan (e.g. 42 â€” must be open and from the canonical repo)'
        required: true
        type: string

# Top-level permissions are the floor for ALL jobs: only `contents: read`. The
# plan-builder job (Phase C2) overrides its own permissions block to ADD
# `id-token: write` (WIF) and `pull-requests: write` (post diff). No other
# job needs them.
permissions:
  contents: read

concurrency:
  # PR runs share a group per ref so a force-push cancels the older run
  # (saves CI cost; the gate is fast to redo). Workflow_dispatch runs
  # carry the event in the group so they NEVER collide with PR runs, and
  # `cancel-in-progress` flips to false so a partial artifact upload
  # cannot be aborted by a second dispatch â€” the job-level concurrency in
  # the plan-builder job serializes dispatches per PR (see Task 7b).
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  static-gate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        # fetch-depth: 0 so the gate can `git diff base...head` across the
        # full history (both commits must be present locally).
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Setup uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4.2.0
        with:
          cache: true
          cache-dependency-glob: 'uv.lock'

      - name: Setup Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'

      - name: Sync dependencies
        run: uv sync --all-extras

      - name: Derive gate mode
        # agent (strict) if the PR carries the `driftscribe-infra` label OR the
        # head branch starts with `infra/`; otherwise operator (foundation
        # edits allowed). Defaults to operator.
        env:
          HEAD_REF: ${{ github.head_ref }}
          HAS_INFRA_LABEL: ${{ contains(github.event.pull_request.labels.*.name, 'driftscribe-infra') }}
        run: |
          if [ "$HAS_INFRA_LABEL" = "true" ] || [ "${HEAD_REF#infra/}" != "$HEAD_REF" ]; then
            MODE=agent
          else
            MODE=operator
          fi
          echo "Resolved gate MODE=$MODE (label=$HAS_INFRA_LABEL head_ref=$HEAD_REF)"
          echo "MODE=$MODE" >> "$GITHUB_ENV"

      - name: Run static HCL gate
        run: |
          uv run python -m tools.iac_static_gate \
            --base "${{ github.event.pull_request.base.sha }}" \
            --head "${{ github.event.pull_request.head.sha }}" \
            --mode "$MODE"

  tofu:
    needs: static-gate
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@847eaa4afeb791b06daa46e8eafa8b1b68d7cfb4 # v2.0.1

      - name: tofu init
        # -backend=false: no remote state access in CI.
        # -lockfile=readonly: FAILS if the PR would change the committed
        # .terraform.lock.hcl â€” this is the intended provider-add guard.
        run: tofu -chdir=iac init -backend=false -lockfile=readonly

      - name: tofu fmt
        run: tofu -chdir=iac fmt -check

      - name: tofu validate
        run: tofu -chdir=iac validate
