name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          cache: true
          cache-dependency-glob: 'uv.lock'

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Sync dependencies
        run: uv sync --all-extras

      - name: Run ruff
        run: uv run ruff check .

      - name: Run pytest
        run: uv run pytest -q

  # Frontend (Svelte+Vite operator UI): build + type-check + unit tests.
  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Type-check (svelte-check)
        working-directory: frontend
        run: npm run check

      - name: Unit tests (vitest)
        working-directory: frontend
        run: npm run test:unit

  # UI smoke: boots the REAL FastAPI app serving the built shell + /static and
  # drives it with a mock-Playwright spec. REQUIRED — this is the pre-merge
  # stand-in for the dispatch-only cloud e2e (.github/workflows/e2e.yml).
  ui-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          cache: true
          cache-dependency-glob: 'uv.lock'

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Sync Python deps
        run: uv sync --all-extras

      - name: Install + build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run UI smoke
        working-directory: frontend
        env:
          CI: '1'
        run: npm run test:smoke
