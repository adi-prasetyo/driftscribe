        // pill, status pill, and the three timeline group panes. The rail
        // itself stays so the operator can hop between historical traces.
        if (typeof clearTraceBadge === "function") clearTraceBadge();
        if (typeof hideFinalResponse === "function") hideFinalResponse();
        if (typeof clearTimeline === "function") clearTimeline();
        // Step 3: dim the form and show the banner.
        if (chatForm) chatForm.classList.add("historical");
        if (sendBtn) sendBtn.disabled = true;
        if (promptInput) promptInput.disabled = true;
        if (workloadSelect) workloadSelect.disabled = true;
        if (historicalBadge) historicalBadge.setAttribute("data-active", "1");
        if (historicalTraceIdEl) {
          historicalTraceIdEl.textContent = traceId.slice(0, 8);
        }
        activeHistoricalTraceId = traceId;
      }

      function _exitHistoricalMode() {
        // Re-enable form + hide banner. The timeline + trace pill + final
        // card are wiped so a stale historical render doesn't bleed into
        // the next live Send.
        if (typeof clearTraceBadge === "function") clearTraceBadge();
        if (typeof hideFinalResponse === "function") hideFinalResponse();
        if (typeof clearTimeline === "function") clearTimeline();
        if (chatForm) chatForm.classList.remove("historical");
        if (sendBtn) sendBtn.disabled = false;
        if (promptInput) promptInput.disabled = false;
        if (workloadSelect) workloadSelect.disabled = false;
        if (historicalBadge) historicalBadge.removeAttribute("data-active");
        if (historicalTraceIdEl) historicalTraceIdEl.textContent = "";
        activeHistoricalTraceId = null;
        // Re-render the rail so the previously-highlighted row drops its
        // ``.active`` class. Fire-and-forget — the rail will catch up on
        // its next /decisions refresh anyway.
        loadDecisions();
      }

      async function openHistoricalTrace(traceId) {
        if (!traceId) return;
        _enterHistoricalMode(traceId);
        // Show the trace pill + a stable "historical" status so the
        // operator can copy the full trace_id (same affordance as live
        // mode) and isn't staring at a blank trace-badge row.
        if (typeof setTracePill === "function") setTracePill(traceId);
        if (typeof setStatusPill === "function") {
          setStatusPill("complete", "historical");
        }
        let resp;
        try {
          resp = await api("/trace/" + encodeURIComponent(traceId));
        } catch (err) {
          if (typeof showFinalResponse === "function") {
            showFinalResponse(
              "Cannot load historical trace: operator token missing.",
              { error: true }
            );
          }
          return;
        }
        if (!resp.ok) {
          if (typeof showFinalResponse === "function") {
            showFinalResponse(
              "Failed to load historical trace " +
                traceId.slice(0, 8) +
                " (" +
                resp.status +
                ")",
              { error: true }
            );
          }
          if (typeof setStatusPill === "function") {
            setStatusPill("error", "trace " + resp.status);
          }
          return;
        }
        let payload;
        try {
          payload = await resp.json();
        } catch (err) {
          if (typeof setStatusPill === "function") {
            setStatusPill("error", "bad trace payload");
          }
          return;
        }
        const events = Array.isArray(payload.events) ? payload.events : [];
        if (typeof renderTimeline === "function") {
          renderTimeline(events);
        }
        // Surface the linked decision's final_response / rationale in the
        // top card — judges expect SOME affordance above the timeline,
        // not just the bare event list. Use the decision dict for context;
        // a final_response event would have rendered into the timeline.
        const decision = payload && payload.decision;
        if (decision && typeof showFinalResponse === "function") {
          const ratio =
            decision.rationale ||
            decision.rendered_body ||
            "(historical decision — see timeline for details)";
          showFinalResponse(String(ratio));
        }
        // Re-highlight the active row in the rail (no full reload — the
        // rail's current snapshot already has this row, we just need to
        // toggle the class). We re-render the full rail instead so the
        // ``.active`` class is applied via the row builder's own check
        // against ``activeHistoricalTraceId`` — keeps the source of truth
        // in one place (the row builder) rather than spreading the
        // class-toggle logic across two call sites.
        loadDecisions();
      }

      if (newChatBtn) {
        newChatBtn.addEventListener("click", _exitHistoricalMode);
      }

      // Initial load: only if a token is already in sessionStorage. The
      // 19.B.2 design is explicit that page load must NOT pop a token
      // prompt — getToken() would block on a window.prompt() if no token
      // is cached. Once the operator submits their first Send, the chat
      // path's getToken() pops the prompt, then reloadDecisions() fires
      // and the rail catches up.
      try {
        if (sessionStorage.getItem("driftscribe_token")) {
          loadDecisions();
        } else {
          // Surface the placeholder so the rail isn't visually empty pre-
          // first-Send; loadDecisions() will replace it once a token lands.
          if (decisionsList) {
            decisionsList.innerHTML = "";
            const empty = document.createElement("li");
            empty.className = "decisions-empty";
            empty.textContent = "(set token to load decisions)";
            decisionsList.appendChild(empty);
          }
        }
      } catch (err) {
        // sessionStorage may throw in privacy modes — best-effort.
      }

      window.driftscribe = Object.assign(window.driftscribe || {}, {
        reloadDecisions: loadDecisions,
        openHistoricalTrace,
        exitHistoricalMode: _exitHistoricalMode,
      });
    })();
  </script>
</body>
</html>
