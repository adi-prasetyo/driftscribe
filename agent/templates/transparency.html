<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="referrer" content="no-referrer">
  <meta name="robots" content="noindex,nofollow">
  <title>DriftScribe — Reasoning Timeline</title>
  <style>
    /* ----------------------------------------------------------------- */
    /*  Phase 19.B.1 scaffolding — visual structure only. Token prompt   */
    /*  (19.B.2), chat fetch (19.B.3), and timeline rendering (19.B.4)   */
    /*  layer logic on top of these IDs/classes without restructuring    */
    /*  the markup.                                                       */
    /* ----------------------------------------------------------------- */
    :root {
      --fg: #222;
      --muted: #666;
      --border: #ddd;
      --bg-card: #fafafa;
      --bg-rail: #f4f4f4;
      --accent: #2ea44f;
      --danger: #d73a49;
      --warn: #b07d00;
    }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, system-ui, "Segoe UI", sans-serif;
      margin: 0;
      color: var(--fg);
      line-height: 1.45;
      background: #fff;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.9em 1.5em;
      border-bottom: 1px solid var(--border);
      background: #fff;
    }
    header h1 {
      font-size: 1.2em;
      margin: 0;
      font-weight: 600;
    }
    .pill {
      display: inline-block;
      padding: 0.2em 0.7em;
      border-radius: 999px;
      font-size: 0.8em;
      font-weight: 600;
      background: #eee;
      color: var(--muted);
    }
    .pill.ok { background: #e6f4ea; color: var(--accent); }
    .pill.warn { background: #fff4d6; color: var(--warn); }
    .pill.err { background: #fde7e9; color: var(--danger); }
    main {
      display: grid;
      grid-template-columns: 260px 1fr;
      min-height: calc(100vh - 56px);
    }
    aside#decisions-rail {
      border-right: 1px solid var(--border);
      background: var(--bg-rail);
      padding: 1em;
      overflow-y: auto;
    }
    aside#decisions-rail h2 {
      font-size: 0.85em;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      margin: 0 0 0.75em 0;
    }
    aside#decisions-rail ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    section#chat-area {
      padding: 1.5em 2em;
      max-width: 900px;
    }
    section#chat-area form {
      display: flex;
      gap: 0.5em;
      align-items: stretch;
      margin-bottom: 1.25em;
    }
    #prompt-input {
      flex: 1;
      padding: 0.55em 0.75em;
      font-size: 1em;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-family: inherit;
    }
    #workload-select {
      padding: 0.55em 0.5em;
      font-size: 1em;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: #fff;
    }
    #send-btn {
      padding: 0.55em 1.25em;
      border: 0;
      border-radius: 4px;
      font-size: 1em;
      font-weight: 600;
      cursor: pointer;
      background: var(--accent);
      color: #fff;
    }
    #send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    section#trace-badge {
      margin: 0.5em 0 1em;
      display: flex;
      gap: 0.5em;
      align-items: center;
      min-height: 1.5em;
    }
    section#final-response-card {
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: 4px;
      padding: 1em 1.25em;
      margin: 0 0 1.5em 0;
      background: var(--bg-card);
      white-space: pre-wrap;
    }
    section#final-response-card[hidden] { display: none; }
    details.group {
      border: 1px solid var(--border);
      border-radius: 4px;
      margin: 0.5em 0;
      background: #fff;
    }
    details.group > summary {
      cursor: pointer;
      padding: 0.6em 0.9em;
      font-weight: 600;
      list-style: none;
      user-select: none;
    }
    details.group > summary::-webkit-details-marker { display: none; }
    details.group > summary::before {
      content: "▸";
      display: inline-block;
      width: 1em;
      color: var(--muted);
      transition: transform 0.1s;
    }
    details.group[open] > summary::before { content: "▾"; }
    details.group .events {
      padding: 0.25em 1em 0.75em 1.9em;
      border-top: 1px solid var(--border);
    }
    details.group .events:empty::before {
      content: "(no events yet)";
      color: var(--muted);
      font-size: 0.9em;
      font-style: italic;
    }
    code { background: #eee; padding: 0 0.25em; border-radius: 3px; font-size: 0.9em; }
  </style>
</head>
<body>
  <header>
    <h1>DriftScribe — Reasoning Timeline</h1>
    <span id="token-status" class="pill" aria-live="polite">token: not set</span>
  </header>

  <main>
    <aside id="decisions-rail" aria-label="Past decisions">
      <h2>Past decisions</h2>
      <ul id="decisions-list">
        <!-- Populated by /decisions fetch (Phase 19.B.3+) -->
      </ul>
    </aside>

    <section id="chat-area" aria-label="Chat and reasoning timeline">
      <form id="chat-form" autocomplete="off">
        <input
          id="prompt-input"
          name="prompt"
          type="text"
          placeholder="Ask the coordinator…"
          aria-label="Prompt"
        >
        <select id="workload-select" name="workload" aria-label="Workload">
          <option value="drift">drift</option>
          <option value="upgrade">upgrade</option>
        </select>
        <button id="send-btn" type="submit">Send</button>
      </form>

      <section id="trace-badge" aria-live="polite">
        <!-- trace_id pill + status pill populated after /chat returns (19.B.3) -->
      </section>

      <section id="final-response-card" aria-live="polite" hidden>
        <!-- Filled directly from the /chat response body (19.B.3) -->
      </section>

      <details id="group-coordinator" class="group" open>
        <summary>Coordinator reasoning</summary>
        <div class="events" data-group="coordinator"></div>
      </details>

      <details id="group-tools" class="group">
        <summary>Tool calls</summary>
        <div class="events" data-group="tools"></div>
      </details>

      <details id="group-mcp" class="group">
        <summary>MCP traffic</summary>
        <div class="events" data-group="mcp"></div>
      </details>
    </section>
  </main>

  <script>
    // Phase 19.B.1: structural scaffolding only. Token prompt (19.B.2),
    // /chat submission + final-response card (19.B.3), and timeline
    // rendering from /trace/{id} (19.B.4) attach to the IDs above in
    // subsequent commits. Kept as an empty IIFE so later tasks can
    // append handlers without restructuring the document.
    (function () {
      "use strict";
      // intentionally empty — wired up in 19.B.2 through 19.B.4
    })();
  </script>
</body>
</html>
