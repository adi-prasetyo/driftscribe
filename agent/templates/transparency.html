<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="referrer" content="no-referrer">
  <meta name="robots" content="noindex,nofollow">
  <title>DriftScribe — Reasoning Timeline</title>
  <style>
    /* ----------------------------------------------------------------- */
    /*  Phase 19.B.1 scaffolding — visual structure only. Token prompt   */
    /*  (19.B.2), chat fetch (19.B.3), and timeline rendering (19.B.4)   */
    /*  layer logic on top of these IDs/classes without restructuring    */
    /*  the markup.                                                       */
    /* ----------------------------------------------------------------- */
    :root {
      --fg: #222;
      --muted: #666;
      --border: #ddd;
      --bg-card: #fafafa;
      --bg-rail: #f4f4f4;
      --accent: #2ea44f;
      --danger: #d73a49;
      --warn: #b07d00;
    }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, system-ui, "Segoe UI", sans-serif;
      margin: 0;
      color: var(--fg);
      line-height: 1.45;
      background: #fff;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.9em 1.5em;
      border-bottom: 1px solid var(--border);
      background: #fff;
    }
    header h1 {
      font-size: 1.2em;
      margin: 0;
      font-weight: 600;
    }
    .pill {
      display: inline-block;
      padding: 0.2em 0.7em;
      border-radius: 999px;
      font-size: 0.8em;
      font-weight: 600;
      background: #eee;
      color: var(--muted);
    }
    .pill.ok { background: #e6f4ea; color: var(--accent); }
    .pill.warn { background: #fff4d6; color: var(--warn); }
    .pill.err { background: #fde7e9; color: var(--danger); }
    /* ----------------------------------------------------------------- */
    /*  19.B.3: trace + status pills in #trace-badge. Class is rewritten  */
    /*  wholesale by updateStatusPill() / setTracePill(), so each state   */
    /*  needs its own background/color baked in (same pattern as the      */
    /*  .token-status block below).                                        */
    /* ----------------------------------------------------------------- */
    .status-pill, .trace-pill {
      display: inline-block;
      padding: 0.2em 0.7em;
      border-radius: 999px;
      font-size: 0.8em;
      font-weight: 600;
      background: #eee;
      color: var(--muted);
    }
    .trace-pill { cursor: pointer; font-family: ui-monospace, "SF Mono", Menlo, monospace; }
    .status-pill.pending { background: #eee; color: var(--muted); }
    .status-pill.streaming { background: #e6f0fb; color: #1f6feb; }
    .status-pill.complete { background: #e6f4ea; color: var(--accent); }
    .status-pill.stalled { background: #fff4d6; color: var(--warn); }
    .status-pill.error { background: #fde7e9; color: var(--danger); }
    .timeline-hint {
      color: var(--muted);
      font-size: 0.9em;
      font-style: italic;
      padding: 0.4em 0;
    }
    .event-row {
      padding: 0.35em 0;
      border-bottom: 1px dotted var(--border);
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 0.85em;
    }
    .event-row:last-child { border-bottom: 0; }
    .event-row .event-meta { color: var(--muted); margin-right: 0.5em; }
    #final-response-card.error {
      border-left-color: var(--danger);
      background: #fdf2f3;
    }
    /* ----------------------------------------------------------------- */
    /*  19.B.2: token-status pill states. Mirrors the .pill palette but   */
    /*  scoped to #token-status so the JS can set className without       */
    /*  stomping the base .pill class — class is rewritten wholesale in   */
    /*  updateTokenStatus(), so each state needs its own background/color */
    /*  baked in here.                                                    */
    /* ----------------------------------------------------------------- */
    .token-status {
      display: inline-block;
      padding: 0.2em 0.7em;
      border-radius: 999px;
      font-size: 0.8em;
      font-weight: 600;
      background: #eee;
      color: var(--muted);
    }
    .token-status.ok { background: #e6f4ea; color: var(--accent); }
    .token-status.missing { background: #eee; color: var(--muted); }
    .token-status.invalid { background: #fde7e9; color: var(--danger); }
    #change-token-btn {
      margin-left: 0.6em;
      background: none;
      border: 0;
      color: var(--muted);
      font-size: 0.8em;
      text-decoration: underline;
      cursor: pointer;
      padding: 0;
      font-family: inherit;
    }
    #change-token-btn:hover { color: var(--fg); }
    main {
      display: grid;
      grid-template-columns: 260px 1fr;
      min-height: calc(100vh - 56px);
    }
    aside#decisions-rail {
      border-right: 1px solid var(--border);
      background: var(--bg-rail);
      padding: 1em;
      overflow-y: auto;
    }
    aside#decisions-rail h2 {
      font-size: 0.85em;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      margin: 0 0 0.75em 0;
    }
    aside#decisions-rail ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    /* ----------------------------------------------------------------- */
    /*  19.B.6: past-decisions rail row + historical-trace mode.          */
    /*                                                                    */
    /*  Each <li.decision-row> is a single decision summary line + an     */
    /*  optional [open trace →] / [Approve →] button row beneath it.      */
    /*  Rows are clickable as a whole (opens trace) but the button is     */
    /*  kept explicit so a judge sees the affordance without hovering.    */
    /* ----------------------------------------------------------------- */
    li.decision-row {
      padding: 0.5em 0.6em;
      margin-bottom: 0.4em;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 3px;
      font-size: 0.82em;
    }
    li.decision-row.active {
      border-color: #1f6feb;
      background: #eaf2fb;
    }
    li.decision-row .row-summary {
      color: var(--fg);
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      word-break: break-word;
    }
    li.decision-row .row-meta {
      color: var(--muted);
      margin-right: 0.4em;
    }
    li.decision-row .row-actions {
      margin-top: 0.4em;
      display: flex;
      flex-wrap: wrap;
      gap: 0.4em;
    }
    li.decision-row .open-trace-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 0.25em 0.6em;
      font: inherit;
      font-size: 0.85em;
      cursor: pointer;
      color: #1f6feb;
    }
    li.decision-row .open-trace-btn:hover { background: #eaf2fb; }
    li.decision-row .past-approve-btn {
      display: inline-block;
      padding: 0.25em 0.7em;
      border-radius: 3px;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.85em;
      border: 1px solid #259443;
    }
    li.decision-row .past-approve-btn:hover { background: #259443; }
    li.decision-row .past-approve-btn.expired {
      background: #eee;
      color: var(--muted);
      border-color: var(--border);
      text-decoration: line-through;
      pointer-events: none;
      cursor: not-allowed;
    }
    li.decision-row .expired-badge {
      display: inline-block;
      padding: 0.05em 0.5em;
      border-radius: 999px;
      background: #fde7e9;
      color: var(--danger);
      font-size: 0.75em;
      font-weight: 600;
      margin-left: 0.3em;
    }
    .decisions-empty {
      color: var(--muted);
      font-size: 0.85em;
      font-style: italic;
      padding: 0.2em 0;
    }
    /* Historical-trace mode: dim the form, show a banner, allow exit. */
    #historical-badge {
      display: none;
      align-items: center;
      gap: 0.6em;
      padding: 0.55em 0.85em;
      margin: 0 0 0.85em 0;
      border: 1px solid #c7dcf3;
      border-radius: 4px;
      background: #eaf2fb;
      color: #1f6feb;
      font-size: 0.9em;
    }
    #historical-badge[data-active="1"] { display: flex; }
    #historical-badge code {
      background: #d6e6fa;
      padding: 0 0.3em;
      border-radius: 3px;
      font-size: 0.9em;
    }
    #new-chat-btn {
      margin-left: auto;
      background: #fff;
      border: 1px solid #c7dcf3;
      border-radius: 3px;
      padding: 0.25em 0.7em;
      font: inherit;
      font-size: 0.85em;
      cursor: pointer;
      color: #1f6feb;
    }
    #new-chat-btn:hover { background: #d6e6fa; }
    #chat-form.historical {
      opacity: 0.45;
      pointer-events: none;
    }
    section#chat-area {
      padding: 1.5em 2em;
      max-width: 900px;
    }
    section#chat-area form {
      display: flex;
      gap: 0.5em;
      align-items: stretch;
      margin-bottom: 1.25em;
    }
    #prompt-input {
      flex: 1;
      padding: 0.55em 0.75em;
      font-size: 1em;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-family: inherit;
    }
    #workload-select {
      padding: 0.55em 0.5em;
      font-size: 1em;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: #fff;
    }
    #send-btn {
      padding: 0.55em 1.25em;
      border: 0;
      border-radius: 4px;
      font-size: 1em;
      font-weight: 600;
      cursor: pointer;
      background: var(--accent);
      color: #fff;
    }
    #send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    section#trace-badge {
      margin: 0.5em 0 1em;
      display: flex;
      gap: 0.5em;
      align-items: center;
      min-height: 1.5em;
    }
    section#final-response-card {
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: 4px;
      padding: 1em 1.25em;
      margin: 0 0 1.5em 0;
      background: var(--bg-card);
      white-space: pre-wrap;
    }
    section#final-response-card[hidden] { display: none; }
    details.group {
      border: 1px solid var(--border);
      border-radius: 4px;
      margin: 0.5em 0;
      background: #fff;
    }
    details.group > summary {
      cursor: pointer;
      padding: 0.6em 0.9em;
      font-weight: 600;
      list-style: none;
      user-select: none;
    }
    details.group > summary::-webkit-details-marker { display: none; }
    details.group > summary::before {
      content: "▸";
      display: inline-block;
      width: 1em;
      color: var(--muted);
      transition: transform 0.1s;
    }
    details.group[open] > summary::before { content: "▾"; }
    details.group .events {
      padding: 0.25em 1em 0.75em 1.9em;
      border-top: 1px solid var(--border);
    }
    details.group .events:empty::before {
      content: "(no events yet)";
      color: var(--muted);
      font-size: 0.9em;
      font-style: italic;
    }
    /* ----------------------------------------------------------------- */
    /*  19.B.4: nested <details> for sub-groups (per-tool) inside the     */
    /*  top-level Coordinator / Tools / MCP groups, plus the per-event    */
    /*  <details> rendered inside each sub-group. Visually distinct from  */
    /*  the top-level groups (smaller, lighter borders) so a judge can    */
    /*  parse the hierarchy at a glance.                                  */
    /* ----------------------------------------------------------------- */
    details.subgroup {
      border: 1px solid #e5e5e5;
      border-radius: 3px;
      margin: 0.35em 0;
      background: #fff;
    }
    details.subgroup > summary {
      cursor: pointer;
      padding: 0.4em 0.7em;
      font-weight: 600;
      font-size: 0.92em;
      list-style: none;
      user-select: none;
    }
    details.subgroup > summary::-webkit-details-marker { display: none; }
    details.subgroup > summary::before {
      content: "▸";
      display: inline-block;
      width: 1em;
      color: var(--muted);
    }
    details.subgroup[open] > summary::before { content: "▾"; }
    details.subgroup .summary-meta {
      color: var(--muted);
      font-weight: 400;
      font-size: 0.85em;
      margin-left: 0.5em;
    }
    details.subgroup .sub-events {
      padding: 0.25em 0.8em 0.6em 1.7em;
      border-top: 1px solid #eee;
    }
    details.event {
      border-bottom: 1px dotted var(--border);
      padding: 0.3em 0;
    }
    details.event:last-child { border-bottom: 0; }
    details.event > summary {
      cursor: pointer;
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 0.85em;
      list-style: none;
      user-select: none;
    }
    details.event > summary::-webkit-details-marker { display: none; }
    details.event > summary::before {
      content: "▸";
      display: inline-block;
      width: 1em;
      color: var(--muted);
    }
    details.event[open] > summary::before { content: "▾"; }
    details.event .event-meta {
      color: var(--muted);
      margin-right: 0.5em;
    }
    details.event .summary-text {
      font-style: italic;
      color: var(--fg);
    }
    details.event pre {
      background: var(--bg-card);
      padding: 0.5em 0.7em;
      border-radius: 3px;
      font-size: 0.82em;
      white-space: pre-wrap;
      word-break: break-word;
      margin: 0.3em 0 0.1em 0;
      overflow-x: auto;
    }
    .group-empty {
      color: var(--muted);
      font-size: 0.9em;
      font-style: italic;
      padding: 0.25em 0;
    }
    /* ----------------------------------------------------------------- */
    /*  19.B.5: inline HITL approval CTA. Rendered ABOVE the result_      */
    /*  preview <pre> inside a tool_result <details> when the result      */
    /*  carries an ``approval_url`` starting with ``/approvals/`` (same-  */
    /*  origin guard). Warning-yellow card so it visually pops from the   */
    /*  monochrome JSON receipt below it.                                 */
    /* ----------------------------------------------------------------- */
    .approval-cta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75em;
      margin: 0.4em 0 0.5em 0;
      padding: 0.6em 0.85em;
      border: 1px solid #ebd9a3;
      border-radius: 4px;
      background: #fff4d6;
      color: var(--warn);
      font-size: 0.92em;
    }
    .approval-cta strong { color: var(--warn); }
    .approval-btn {
      display: inline-block;
      padding: 0.45em 1.1em;
      border-radius: 4px;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95em;
      border: 1px solid #259443;
      white-space: nowrap;
    }
    .approval-btn:hover { background: #259443; }
    .approval-btn:focus { outline: 2px solid #1f6feb; outline-offset: 2px; }
    .pair-row {
      padding: 0.2em 0;
    }
    .pair-result-ok { color: var(--accent); }
    .pair-result-err { color: var(--danger); }
    .usage-block {
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 0.85em;
      color: var(--fg);
      padding: 0.3em 0;
    }
    .usage-block .usage-meta { color: var(--muted); margin-right: 0.5em; }
    footer.legend {
      margin: 2em 0 1em 0;
      padding: 0.75em 1em;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.82em;
      display: flex;
      flex-wrap: wrap;
      gap: 1.2em;
      align-items: center;
    }
    footer.legend .legend-item { display: inline-flex; align-items: center; gap: 0.35em; }
    footer.legend .swatch {
      display: inline-block;
      width: 0.9em;
      height: 0.9em;
      border-radius: 2px;
      vertical-align: middle;
    }
    footer.legend .swatch.coord { background: #e6f0fb; border: 1px solid #c7dcf3; }
    footer.legend .swatch.tools { background: #fff4d6; border: 1px solid #ebd9a3; }
    footer.legend .swatch.mcp { background: #ece6fb; border: 1px solid #d2c8f0; }
    footer.legend .swatch.ok { background: #e6f4ea; border: 1px solid #b6dabb; }
    footer.legend .swatch.err { background: #fde7e9; border: 1px solid #f0b8bd; }
    code { background: #eee; padding: 0 0.25em; border-radius: 3px; font-size: 0.9em; }
  </style>
</head>
<body>
  <header>
    <h1>DriftScribe — Reasoning Timeline</h1>
    <div>
      <span id="token-status" class="token-status missing" aria-live="polite">no token</span>
      <button id="change-token-btn" type="button" title="Clear stored token and re-prompt">change token</button>
    </div>
  </header>

  <main>
    <aside id="decisions-rail" data-testid="past-decisions-pane" aria-label="Past decisions">
      <h2>Past decisions</h2>
      <ul id="decisions-list">
        <!-- Populated by /decisions fetch (Phase 19.B.3+) -->
      </ul>
    </aside>

    <section id="chat-area" aria-label="Chat and reasoning timeline">
      <form id="chat-form" autocomplete="off">
        <input
          id="prompt-input"
          data-testid="chat-prompt"
          name="prompt"
          type="text"
          placeholder="Ask the coordinator…"
          aria-label="Prompt"
        >
        <select id="workload-select" name="workload" aria-label="Workload">
          <option value="drift">drift</option>
          <option value="upgrade">upgrade</option>
        </select>
        <button id="send-btn" data-testid="chat-submit" type="submit">Send</button>
      </form>

      <!-- 19.B.6: historical-trace banner. Shown only when a past decision
           is opened from the left rail; the form above is dimmed via the
           ``.historical`` class. "← new chat" button restores live mode. -->
      <div id="historical-badge" data-testid="historical-banner" aria-live="polite">
        <span>viewing historical trace <code id="historical-trace-id"></code></span>
        <button id="new-chat-btn" type="button">← new chat</button>
      </div>

      <section id="trace-badge" aria-live="polite">
        <!-- trace_id pill + status pill populated after /chat returns (19.B.3) -->
      </section>

      <section id="final-response-card" data-testid="final-response" aria-live="polite" hidden>
        <!-- Filled directly from the /chat response body (19.B.3) -->
      </section>

      <details id="group-coordinator" class="group" open>
        <summary>Coordinator reasoning</summary>
        <div class="events" data-group="coordinator"></div>
      </details>

      <details id="group-tools" class="group">
        <summary>Tool calls</summary>
        <div class="events" data-group="tools"></div>
      </details>

      <details id="group-mcp" class="group">
        <summary>MCP traffic</summary>
        <div class="events" data-group="mcp"></div>
      </details>

      <!-- 19.B.4: color/icon legend so a judge can read the page cold. -->
      <footer class="legend" aria-label="Legend">
        <span class="legend-item"><span class="swatch coord"></span>Coordinator reasoning (llm_thought, llm_usage)</span>
        <span class="legend-item"><span class="swatch tools"></span>Tools &amp; workers (tool_call / tool_result)</span>
        <span class="legend-item"><span class="swatch mcp"></span>MCP (Developer Knowledge)</span>
        <span class="legend-item"><span class="swatch ok"></span>ok</span>
        <span class="legend-item"><span class="swatch err"></span>error</span>
        <span class="legend-item">▸ collapsed · ▾ expanded</span>
      </footer>
    </section>
  </main>

  <script>
    // Phase 19.B.1: structural scaffolding only. Token prompt (19.B.2),
    // /chat submission + final-response card (19.B.3), and timeline
    // rendering from /trace/{id} (19.B.4) attach to the IDs above in
    // subsequent commits. Kept as an empty IIFE so later tasks can
    // append handlers without restructuring the document.
    (function () {
      "use strict";

      // ------------------------------------------------------------- //
      //  19.B.2: token prompt + sessionStorage helper.                 //
      //                                                                //
      //  The HTML route itself is unauthenticated (so a judge can     //
      //  view the page), but every JSON endpoint the page calls       //
      //  (/chat, /trace/{id}, /decisions, /recheck) requires the      //
      //  X-DriftScribe-Token header. We prompt() once per session     //
      //  and cache in sessionStorage — survives reloads but not a     //
      //  tab close, which is the right ttl for a shared demo token.   //
      // ------------------------------------------------------------- //
      const TOKEN_KEY = "driftscribe_token";

      function updateTokenStatus(state) {
        const el = document.getElementById("token-status");
        if (!el) return;
        // Wholesale className rewrite — see CSS comment above.
        el.className = "token-status " + state;
        el.textContent = ({
          ok: "token ok",
          missing: "no token",
          invalid: "token rejected",
        })[state];
      }

      function getToken() {
        let t = sessionStorage.getItem(TOKEN_KEY);
        while (!t) {
          // prompt() returns null on Cancel; loop until the operator
          // either pastes a token or accepts that the UI is non-functional.
          t = window.prompt("Enter DriftScribe operator token:");
          if (t === null) {
            // User cancelled. Leave token unset; subsequent api() calls
            // will re-prompt. UI shows token-status pill as "missing".
            updateTokenStatus("missing");
            return null;
          }
          t = t.trim();
          if (t) sessionStorage.setItem(TOKEN_KEY, t);
        }
        updateTokenStatus("ok");
        return t;
      }

      async function api(path, init = {}) {
        // Phase 21: try-then-prompt. CF Access users sign in via Google;
        // the coordinator accepts the resulting Cf-Access-Jwt-Assertion
        // header (auto-injected by CF) in lieu of X-DriftScribe-Token.
        // Sending no token first lets that path succeed silently — only
        // if the server explicitly says "I need a token" (401/403) do we
        // prompt. Token-required users see one extra failed request per
        // session before the prompt; CF Access users never see it.
        const headers = new Headers(init.headers || {});
        const stored = sessionStorage.getItem(TOKEN_KEY);
        if (stored) headers.set("X-DriftScribe-Token", stored);

        let resp = await fetch(path, { ...init, headers });

        if (resp.status === 401 || resp.status === 403) {
          // Server demands a token (CF Access auth either disabled or
          // failed). Clear any stale value and prompt.
          sessionStorage.removeItem(TOKEN_KEY);
          updateTokenStatus("invalid");
          const token = getToken();
          if (!token) {
            return resp;  // user cancelled prompt — surface the 401/403
          }
          headers.set("X-DriftScribe-Token", token);
          resp = await fetch(path, { ...init, headers });
          if (resp.status === 401 || resp.status === 403) {
            sessionStorage.removeItem(TOKEN_KEY);
            updateTokenStatus("invalid");
          } else {
            updateTokenStatus("ok");
          }
        } else if (resp.ok && stored) {
          updateTokenStatus("ok");
        }
        return resp;
      }

      // Wire the "change token" link in the header so operators can swap
      // tokens mid-session (e.g. demo operator hands the laptop to a judge).
      const changeBtn = document.getElementById("change-token-btn");
      if (changeBtn) {
        changeBtn.addEventListener("click", () => {
          sessionStorage.removeItem(TOKEN_KEY);
          updateTokenStatus("missing");
          getToken();
        });
      }

      // Reflect the initial pill state from sessionStorage WITHOUT
      // prompting — page load shouldn't pop a dialog before the user
      // has done anything. The first api() call will prompt as needed.
      updateTokenStatus(sessionStorage.getItem(TOKEN_KEY) ? "ok" : "missing");

      // Expose to subsequent IIFEs (19.B.3/4) without polluting window
      // beyond a single namespaced handle.
      window.driftscribe = Object.assign(window.driftscribe || {}, {
        api,
        getToken,
        updateTokenStatus,
        TOKEN_KEY,
      });
    })();

    // ----------------------------------------------------------------- //
    //  19.B.3: chat submit → immediate final-response card → /trace/{id} //
    //  polling loop. Reuses window.driftscribe.api() from 19.B.2 so the  //
    //  X-DriftScribe-Token plumbing is centralized.                       //
    //                                                                    //
    //  Data flow per Send:                                                //
    //    1. POST /chat → render reply IMMEDIATELY in #final-response-card //
    //       and stash X-Trace-Id from the response header.                //
    //    2. Start a 2s poll loop on /trace/{trace_id}. Each poll RE-      //
    //       RENDERS the event list (Cloud Logging can deliver events out  //
    //       of order during the ~10-30s ingestion lag, so append-only is  //
    //       wrong — we re-render from the authoritative server view).    //
    //    3. Status pill: pending → streaming → complete (or stalled).    //
    //                                                                    //
    //  Polling lifecycle is owned by a monotonically-incrementing token   //
    //  (``activePollingId``). Any in-flight loop checks the token at      //
    //  every await boundary and bails if it no longer matches — that's   //
    //  how a fresh Send cancels the prior loop without needing            //
    //  AbortController plumbing through fetch.                            //
    //                                                                    //
    //  19.B.4 will split the flat event list into the three group        //
    //  <details> blocks; for now everything is rendered into the         //
    //  ``coordinator`` group's .events div so the polling contract is    //
    //  verifiable end-to-end.                                            //
    // ----------------------------------------------------------------- //
    (function () {
      "use strict";
      const api = window.driftscribe.api;

      const POLL_INTERVAL_MS = 2000;
      const POLL_BACKOFF_MS = 3000; // used after a 503 trace fetch
      const STALL_THRESHOLD = 10; // consecutive identical event-counts → stalled

      const form = document.getElementById("chat-form");
      const promptInput = document.getElementById("prompt-input");
      const workloadSelect = document.getElementById("workload-select");
      const sendBtn = document.getElementById("send-btn");
      const traceBadge = document.getElementById("trace-badge");
      const finalCard = document.getElementById("final-response-card");
      // 19.B.4: timeline fans out into three top-level groups. The
      // coordinator events div remains the "primary" landmark (kept for
      // historical compatibility with 19.B.3's empty-state hint), but the
      // grouped renderer writes into all three .events divs below.
      const coordinatorEvents =
        document.querySelector("#group-coordinator .events");
      const toolsEvents = document.querySelector("#group-tools .events");
      const mcpEvents = document.querySelector("#group-mcp .events");
      // Single root used by the polling glue to clear "stale" state. We
      // wipe all three when a fresh Send starts, but the empty-state
      // "waiting…" hint is only injected into the coordinator pane so the
      // page doesn't sprout three identical hints.
      const timelineRoot = coordinatorEvents;

      // -------- 19.B.4: worker-friendly label mapping ----------------- //
      //                                                                 //
      // Codex v3 review MINOR: judges read "Reader (drift)" not          //
      // ``read_live_env_tool``. Mapping is intentionally inline (not a   //
      // separate module) so a maintainer reading this template sees the  //
      // full mapping without jumping files. Add new tools here as the    //
      // workload graph grows.                                            //
      // --------------------------------------------------------------- //
      const _WORKER_LABELS = {
        // Drift workload
        "read_live_env_tool":        "Reader (drift)",
        "patch_docs_tool":           "Docs (drift)",
        "propose_rollback_tool":     "Rollback (drift) — HITL",
        // Upgrade workload — tool names must match the exposed surface
        // in ``agent/adk_tools.py`` (the ``_tool`` suffix is part of the
        // function name the ADK runner sees; misalignment here surfaces
        // raw ``upgrade_read_dependencies_tool`` strings in the timeline
        // instead of the friendly label).
        "upgrade_read_dependencies_tool": "Upgrade Reader",
        "upgrade_propose_pr_tool":        "Upgrade Docs",
        "upgrade_close_pr_tool":          "Upgrade Docs — close PR",
        // Shared
        "notify_tool":               "Notifier",
        // MCP
        "answer_query":              "Developer Knowledge MCP — answer",
        "search_documents":          "Developer Knowledge MCP — search",
        "get_documents":             "Developer Knowledge MCP — get",
      };
      function workerLabel(toolName) {
        return _WORKER_LABELS[toolName] || toolName;
      }

      // Monotonic id stamped onto every polling iteration. A fresh Send
      // increments it; in-flight loops abort when their captured id no
      // longer matches the current value. Avoids tangled abort plumbing
      // and is robust against the polling fetch itself being mid-flight.
      let activePollingId = 0;

      function setTracePill(traceId) {
        // Trace pill = short form (first 8 hex chars). Click copies the
        // full 32-char trace_id so an operator can paste it into a Cloud
        // Logging query without hunting through DOM.
        traceBadge.innerHTML = "";
        if (traceId) {
          const tracePill = document.createElement("span");
          tracePill.className = "trace-pill";
          tracePill.title = "click to copy full trace_id";
          tracePill.textContent = "trace " + traceId.slice(0, 8);
          tracePill.addEventListener("click", () => {
            if (navigator.clipboard && navigator.clipboard.writeText) {
              navigator.clipboard.writeText(traceId).catch(() => {});
            }
          });
          traceBadge.appendChild(tracePill);
        }
        const statusPill = document.createElement("span");
        statusPill.id = "status-pill";
        statusPill.className = "status-pill pending";
        statusPill.textContent = "pending";
        traceBadge.appendChild(statusPill);
      }

      function updateStatusPill(state, label) {
        const el = document.getElementById("status-pill");
        if (!el) return;
        el.className = "status-pill " + state;
        el.textContent = label || state;
      }

      function showFinalResponse(text, opts = {}) {
        finalCard.hidden = false;
        finalCard.classList.toggle("error", Boolean(opts.error));
        finalCard.textContent = text;
      }

      // --------------------------------------------------------------- //
      //  19.B.4: three-group timeline renderer.                          //
      //                                                                 //
      //  Walks the flat events array (chronological order from the      //
      //  server) and bins each event into one of three groups:           //
      //                                                                 //
      //    1. Coordinator: llm_thought, llm_usage                        //
      //    2. Tools:       tool_call, tool_result (paired by tool_name)  //
      //    3. MCP:          mcp_call (sub-grouped by mcp_tool/mcp_server) //
      //                                                                 //
      //  final_response sentinel events are skipped — the immediate     //
      //  /chat response already populated #final-response-card, so       //
      //  re-rendering them in the timeline would just be noise.          //
      //                                                                 //
      //  Expansion state is preserved across re-renders by capturing     //
      //  every open <details data-insert-id> before wiping, then         //
      //  re-opening any element with a matching insert_id post-render.   //
      //  Sub-group <details> (per-tool) use a synthetic                  //
      //  data-insert-id="sub:<group>:<key>" so their open/closed state   //
      //  also survives re-render.                                        //
      //                                                                 //
      //  ID namespacing (review fix): _captureExpanded queries the      //
      //  entire timeline, so synthetic sub-group ids and per-event ids   //
      //  MUST be in disjoint namespaces. Per-event ids are wrapped as    //
      //  ``"evt:" + insert_id`` at write time; sub-groups use            //
      //  ``"sub:<group>:<key>"``. That way even a Cloud Logging          //
      //  insert_id beginning with ``sub:`` can never cross-map.          //
      // --------------------------------------------------------------- //
      function _captureExpanded(root) {
        // Returns raw `data-insert-id` values (already namespaced with
        // "evt:" / "sub:" at write time). Callers check membership using
        // the same prefix they wrote, so the two id spaces stay disjoint.
        const ids = new Set();
        if (!root) return ids;
        root
          .querySelectorAll("details[open][data-insert-id]")
          .forEach((d) => ids.add(d.getAttribute("data-insert-id")));
        return ids;
      }

      function _renderEmptyPlaceholder(container, label) {
        const ph = document.createElement("div");
        ph.className = "group-empty";
        ph.textContent = label || "(no events)";
        container.appendChild(ph);
      }

      function _renderThoughtEvent(e, expandedIds) {
        // llm_thought: italicized 80-char summary, full text in body.
        const insertId = e.insert_id || "";
        // Namespace per-event ids with "evt:" so they can never collide
        // with sub-group synthetic ids ("sub:…"). See _captureExpanded.
        const domId = insertId ? "evt:" + insertId : "";
        const det = document.createElement("details");
        det.className = "event";
        if (domId) det.setAttribute("data-insert-id", domId);
        if (domId && expandedIds.has(domId)) det.open = true;

        const sum = document.createElement("summary");
        const meta = document.createElement("span");
        meta.className = "event-meta";
        meta.textContent = (e.timestamp || "") + " · thought";
        sum.appendChild(meta);
        const text = String(e.thought_text || "");
        const head = text.slice(0, 80) + (text.length > 80 ? "…" : "");
        const span = document.createElement("span");
        span.className = "summary-text";
        span.textContent = head || "(empty)";
        sum.appendChild(span);
        if (e.latency_ms != null) {
          const lat = document.createElement("span");
          lat.className = "event-meta";
          lat.style.marginLeft = "0.5em";
          lat.textContent = " · " + e.latency_ms + "ms";
          sum.appendChild(lat);
        }
        det.appendChild(sum);

        const pre = document.createElement("pre");
        pre.textContent = text || "(empty thought_text)";
        det.appendChild(pre);
        return det;
      }

      function _renderUsageEvent(e) {
        // llm_usage: token-count breakdown, single inline row.
        const row = document.createElement("div");
        row.className = "usage-block";
        // Namespace per-event ids with "evt:" (see _captureExpanded).
        if (e.insert_id) row.setAttribute("data-insert-id", "evt:" + e.insert_id);
        const meta = document.createElement("span");
        meta.className = "usage-meta";
        meta.textContent = (e.timestamp || "") + " · usage";
        row.appendChild(meta);
        const parts = [];
        if (e.prompt_token_count != null) parts.push("prompt=" + e.prompt_token_count);
        if (e.candidates_token_count != null) parts.push("candidates=" + e.candidates_token_count);
        if (e.thoughts_token_count != null) parts.push("thoughts=" + e.thoughts_token_count);
        if (e.total_token_count != null) parts.push("total=" + e.total_token_count);
        row.appendChild(document.createTextNode(parts.join(" · ") || "(no counts)"));
        return row;
      }

      function _pairToolEvents(events) {
        // Pair tool_call → next tool_result with the SAME tool_name.
        // Both events are already chronological from the server, so a
        // single forward pass with a per-tool "open call" queue suffices.
        // Unmatched calls/results are still emitted (as singletons) so
        // an in-flight call doesn't disappear from the UI.
        const pending = new Map(); // tool_name → array of call indexes awaiting a result
        const pairs = []; // {call, result, tool_name, ts}
        for (const e of events) {
          if (e.event === "tool_call") {
            const q = pending.get(e.tool_name) || [];
            q.push({ call: e, result: null });
            pending.set(e.tool_name, q);
          } else if (e.event === "tool_result") {
            const q = pending.get(e.tool_name) || [];
            if (q.length > 0) {
              const head = q.shift();
              head.result = e;
              pairs.push(head);
              pending.set(e.tool_name, q);
            } else {
              // Orphan result (call presumably out of window). Still
              // render so judges don't see it vanish.
              pairs.push({ call: null, result: e });
            }
          }
        }
        // Flush remaining un-resulted calls (in-flight at poll time).
        for (const q of pending.values()) {
          for (const p of q) pairs.push(p);
        }
        return pairs;
      }

      // --------------------------------------------------------------- //
      //  19.B.5: inline HITL approval CTA renderer.                     //
      //                                                                 //
      //  When a tool_result for ``propose_rollback_tool`` carries an    //
      //  ``approval_url`` in its result_preview JSON, this helper       //
      //  builds a small bordered card with an "Approve →" button that  //
      //  opens the same-origin approval page in a new tab.              //
      //                                                                 //
      //  Security posture:                                              //
      //    * result_preview is a JSON STRING (≤2000 chars) — may be    //
      //      truncated mid-string. We catch JSON.parse errors and       //
      //      render nothing in that case.                               //
      //    * ``approval_url`` is parsed via ``new URL(raw, origin)``    //
      //      so both shapes are accepted:                               //
      //         - relative:   ``/approvals/<id>?t=<token>``             //
      //         - absolute:   ``https://<coordinator>/approvals/<id>``  //
      //      …but only when the resolved origin matches the current     //
      //      page's origin AND the pathname starts with                 //
      //      ``/approvals/``. The rollback worker emits ABSOLUTE URLs   //
      //      (see ``workers/rollback/main.py``) — without parse-based   //
      //      acceptance the CTA never renders in real demos. Off-       //
      //      origin URLs (``https://evil.example/...``), non-http       //
      //      schemes (``javascript:``, ``data:``), and malformed URLs   //
      //      degrade to null (no CTA), so an attacker-shaped result     //
      //      can't open-redirect the operator.                          //
      //    * We assign only the resolved RELATIVE href (pathname +     //
      //      search + hash) — never the raw absolute URL — so the      //
      //      DOM never carries an off-origin attacker-controlled       //
      //      string even as inert text.                                 //
      //    * No innerHTML of derived text — all node content is set    //
      //      via textContent (button label is a static literal).       //
      // --------------------------------------------------------------- //
      function _safeApprovalHref(raw) {
        // Resolve ``raw`` against the current page origin and accept
        // ONLY URLs whose resolved origin matches this page's origin
        // AND whose pathname starts with ``/approvals/``. Returns the
        // relative href (pathname + search + hash) on accept, null on
        // reject. See the block comment above ``_renderApprovalCta``
        // for the security rationale.
        try {
          const u = new URL(raw, window.location.origin);
          if (u.origin !== window.location.origin) return null;
          if (!u.pathname.startsWith("/approvals/")) return null;
          return u.pathname + u.search + u.hash;
        } catch (e) {
          return null;
        }
      }

      function _renderApprovalCta(result_preview_string) {
        try {
          const obj = JSON.parse(result_preview_string);
          const url = obj && obj.approval_url;
          const href = (typeof url === "string") ? _safeApprovalHref(url) : null;
          if (!href) {
            return null; // wrong shape / off-origin; render nothing
          }
          const card = document.createElement("div");
          card.className = "approval-cta";

          const headline = document.createElement("strong");
          headline.textContent = "HITL approval required";
          card.appendChild(headline);

          const ctaBtn = document.createElement("a");
          ctaBtn.className = "approval-btn";
          ctaBtn.href = href;
          ctaBtn.target = "_blank";
          ctaBtn.rel = "noopener";
          ctaBtn.textContent = "Approve →";
          card.appendChild(ctaBtn);

          return card;
        } catch (e) {
          return null; // unparseable (likely truncated) preview; render nothing
        }
      }

      function _renderToolPair(pair, expandedIds) {
        // Container per call+result pair. Use the call's insert_id as
        // the stable key so expand-state survives re-render. If the
        // pair only has a result, fall back to result's insert_id.
        const key =
          (pair.call && pair.call.insert_id) ||
          (pair.result && pair.result.insert_id) ||
          "";
        // Namespace per-event ids with "evt:" (see _captureExpanded).
        const domId = key ? "evt:" + key : "";
        const det = document.createElement("details");
        det.className = "event";
        if (domId) det.setAttribute("data-insert-id", domId);
        if (domId && expandedIds.has(domId)) det.open = true;

        const ok = pair.result ? pair.result.result_ok !== false : null;
        const sum = document.createElement("summary");
        const meta = document.createElement("span");
        meta.className = "event-meta";
        const ts =
          (pair.call && pair.call.timestamp) ||
          (pair.result && pair.result.timestamp) ||
          "";
        meta.textContent = ts + " · ";
        sum.appendChild(meta);
        const status = document.createElement("span");
        if (ok === true) status.className = "pair-result-ok";
        else if (ok === false) status.className = "pair-result-err";
        status.textContent =
          ok === true ? "ok" : ok === false ? "error" : "(pending)";
        sum.appendChild(status);
        det.appendChild(sum);

        if (pair.call) {
          const lbl = document.createElement("div");
          lbl.className = "pair-row";
          lbl.style.fontSize = "0.85em";
          lbl.style.color = "var(--muted)";
          lbl.textContent = "tool_args:";
          det.appendChild(lbl);
          const pre = document.createElement("pre");
          pre.textContent = JSON.stringify(pair.call.tool_args || {}, null, 2);
          det.appendChild(pre);
        }
        if (pair.result) {
          const lbl = document.createElement("div");
          lbl.className = "pair-row";
          lbl.style.fontSize = "0.85em";
          lbl.style.color = "var(--muted)";
          lbl.textContent = "result_preview:";
          det.appendChild(lbl);
          // 19.B.5: HITL approval CTA goes ABOVE the JSON receipt — the
          // CTA is the action, the <pre> is the proof. Only fires when
          // the tool is propose_rollback_tool AND the result_preview
          // parses cleanly AND carries a same-origin approval_url. Any
          // other shape (truncated JSON, missing field, off-origin URL)
          // → null, and the <pre> renders alone as before.
          if (pair.result.tool_name === "propose_rollback_tool") {
            const cta = _renderApprovalCta(
              String(pair.result.result_preview || "")
            );
            if (cta) det.appendChild(cta);
          }
          const pre = document.createElement("pre");
          pre.textContent = String(pair.result.result_preview || "(empty)");
          det.appendChild(pre);
        } else if (pair.call) {
          // In-flight call, no result yet.
          const inflight = document.createElement("div");
          inflight.className = "pair-row";
          inflight.style.fontStyle = "italic";
          inflight.style.color = "var(--muted)";
          inflight.textContent = "(awaiting tool_result…)";
          det.appendChild(inflight);
        }
        return det;
      }

      function _renderMcpEvent(e, expandedIds) {
        const insertId = e.insert_id || "";
        // Namespace per-event ids with "evt:" (see _captureExpanded).
        const domId = insertId ? "evt:" + insertId : "";
        const det = document.createElement("details");
        det.className = "event";
        if (domId) det.setAttribute("data-insert-id", domId);
        if (domId && expandedIds.has(domId)) det.open = true;

        const sum = document.createElement("summary");
        const meta = document.createElement("span");
        meta.className = "event-meta";
        const ok = !e.error;
        meta.textContent = (e.timestamp || "") + " · ";
        sum.appendChild(meta);
        const status = document.createElement("span");
        status.className = ok ? "pair-result-ok" : "pair-result-err";
        status.textContent = ok ? "ok" : "error";
        sum.appendChild(status);
        if (e.latency_ms != null) {
          const lat = document.createElement("span");
          lat.className = "event-meta";
          lat.style.marginLeft = "0.5em";
          lat.textContent = " · " + e.latency_ms + "ms";
          sum.appendChild(lat);
        }
        if (e.doc_count != null) {
          const dc = document.createElement("span");
          dc.className = "event-meta";
          dc.style.marginLeft = "0.5em";
          dc.textContent = " · " + e.doc_count + " docs";
          sum.appendChild(dc);
        }
        det.appendChild(sum);

        const qlbl = document.createElement("div");
        qlbl.className = "pair-row";
        qlbl.style.fontSize = "0.85em";
        qlbl.style.color = "var(--muted)";
        qlbl.textContent = "query_or_names:";
        det.appendChild(qlbl);
        const qpre = document.createElement("pre");
        qpre.textContent = String(e.query_or_names || "(empty)");
        det.appendChild(qpre);
        if (e.error) {
          const elbl = document.createElement("div");
          elbl.className = "pair-row pair-result-err";
          elbl.style.fontSize = "0.85em";
          elbl.textContent = "error: " + String(e.error);
          det.appendChild(elbl);
        }
        return det;
      }

      function _latencySpan(values) {
        // Returns "<min>-<max>ms" or "<n>ms" for single-value lists.
        // Filters out null/undefined defensively — some events may omit
        // latency_ms (e.g. an in-flight tool_call before its result).
        const nums = values.filter((v) => typeof v === "number" && !isNaN(v));
        if (nums.length === 0) return "";
        const lo = Math.min(...nums);
        const hi = Math.max(...nums);
        return lo === hi ? lo + "ms" : lo + "-" + hi + "ms";
      }

      function _renderSubgroup(opts) {
        // opts: { label, callCount, latencyValues, extraSummary, key, expandedIds, body }
        const det = document.createElement("details");
        det.className = "subgroup";
        // Synthetic id space: "sub:<group>:<key>". Disjoint from the
        // "evt:<insert_id>" namespace used by per-event <details> (see
        // _captureExpanded). Do not change this prefix without updating
        // the per-event prefix to maintain disjointness.
        const synthId = "sub:" + opts.key;
        det.setAttribute("data-insert-id", synthId);
        // Default sub-groups to open for visibility; preserve user's
        // collapse choice across polls via the synthetic insert_id.
        // (We use a "collapsed set" derived from previously-rendered
        // sub-groups that were CLOSED, not open — but expandedIds only
        // tracks open. So: open by default, then collapse if the user
        // explicitly collapsed before. Track via a sibling closed-set.)
        det.open = true;
        if (opts.collapsedIds && opts.collapsedIds.has(synthId)) det.open = false;

        const sum = document.createElement("summary");
        sum.appendChild(document.createTextNode(opts.label));
        const meta = document.createElement("span");
        meta.className = "summary-meta";
        const span = _latencySpan(opts.latencyValues || []);
        const parts = [opts.callCount + " call" + (opts.callCount === 1 ? "" : "s")];
        if (opts.extraSummary) parts.push(opts.extraSummary);
        if (span) parts.push(span);
        meta.textContent = " · " + parts.join(" · ");
        sum.appendChild(meta);
        det.appendChild(sum);

        const body = document.createElement("div");
        body.className = "sub-events";
        opts.body.forEach((node) => body.appendChild(node));
        det.appendChild(body);
        return det;
      }

      function _captureCollapsed(root) {
        // Mirror of _captureExpanded but for CLOSED sub-groups so we can
        // preserve a user's explicit collapse across re-renders.
        const ids = new Set();
        if (!root) return ids;
        root
          .querySelectorAll("details.subgroup[data-insert-id]")
          .forEach((d) => {
            if (!d.open) ids.add(d.getAttribute("data-insert-id"));
          });
        return ids;
      }

      function renderTimeline(events) {
        if (!coordinatorEvents || !toolsEvents || !mcpEvents) return;

        // Capture per-element expansion state BEFORE wiping the DOM.
        const expandedIds = new Set([
          ..._captureExpanded(coordinatorEvents),
          ..._captureExpanded(toolsEvents),
          ..._captureExpanded(mcpEvents),
        ]);
        const collapsedIds = new Set([
          ..._captureCollapsed(coordinatorEvents),
          ..._captureCollapsed(toolsEvents),
          ..._captureCollapsed(mcpEvents),
        ]);

        coordinatorEvents.innerHTML = "";
        toolsEvents.innerHTML = "";
        mcpEvents.innerHTML = "";

        // Empty timeline — same "waiting…" hint as 19.B.3, dropped into
        // the coordinator pane only (other panes show the standard
        // "(no events)" placeholder via the empty-group branches below).
        if (!events || events.length === 0) {
          const hint = document.createElement("div");
          hint.className = "timeline-hint";
          hint.textContent = "waiting for reasoning logs (typical lag ~15s)…";
          coordinatorEvents.appendChild(hint);
          _renderEmptyPlaceholder(toolsEvents);
          _renderEmptyPlaceholder(mcpEvents);
          return;
        }

        // Classify events into the three groups.
        const coord = []; // llm_thought + llm_usage
        const toolEvents = []; // tool_call + tool_result
        const mcpEvts = []; // mcp_call
        for (const e of events) {
          const kind = e.event;
          if (kind === "llm_thought" || kind === "llm_usage") {
            coord.push(e);
          } else if (kind === "tool_call" || kind === "tool_result") {
            toolEvents.push(e);
          } else if (kind === "mcp_call") {
            mcpEvts.push(e);
          } else if (kind === "final_response") {
            // Sentinel — already rendered in #final-response-card. Skip.
            continue;
          }
          // Unknown event kinds are silently dropped; the server side is
          // authoritative about what kinds exist (see Phase 19.A schemas).
        }

        // -------- Coordinator group ---------------------------------- //
        if (coord.length === 0) {
          _renderEmptyPlaceholder(coordinatorEvents);
        } else {
          for (const e of coord) {
            if (e.event === "llm_thought") {
              coordinatorEvents.appendChild(_renderThoughtEvent(e, expandedIds));
            } else if (e.event === "llm_usage") {
              coordinatorEvents.appendChild(_renderUsageEvent(e));
            }
          }
        }

        // -------- Tools & workers group ------------------------------ //
        if (toolEvents.length === 0) {
          _renderEmptyPlaceholder(toolsEvents);
        } else {
          // Sub-group by tool_name, preserving first-seen order so the
          // visual order matches the chronological tool-call sequence.
          const subgroups = new Map(); // tool_name → events[]
          const order = [];
          for (const e of toolEvents) {
            const tn = e.tool_name || "(unknown)";
            if (!subgroups.has(tn)) {
              subgroups.set(tn, []);
              order.push(tn);
            }
            subgroups.get(tn).push(e);
          }
          for (const tn of order) {
            const evs = subgroups.get(tn);
            const pairs = _pairToolEvents(evs);
            // Latency span across this tool's results (tool_result events
            // carry the wall-clock latency_ms when the executor measures
            // it; absent on tool_call). Fall back to call's own latency
            // field where present so an in-flight call still contributes.
            const latencies = [];
            for (const p of pairs) {
              if (p.result && p.result.latency_ms != null) latencies.push(p.result.latency_ms);
              else if (p.call && p.call.latency_ms != null) latencies.push(p.call.latency_ms);
            }
            const body = pairs.map((p) => _renderToolPair(p, expandedIds));
            toolsEvents.appendChild(
              _renderSubgroup({
                label: workerLabel(tn),
                callCount: pairs.length,
                latencyValues: latencies,
                key: "tools:" + tn,
                expandedIds,
                collapsedIds,
                body,
              })
            );
          }
        }

        // -------- MCP group ------------------------------------------ //
        if (mcpEvts.length === 0) {
          _renderEmptyPlaceholder(mcpEvents);
        } else {
          // Sub-group by mcp_tool (falling back to mcp_server when the
          // tool name isn't carried — older event shapes).
          const subgroups = new Map();
          const order = [];
          for (const e of mcpEvts) {
            const key = e.mcp_tool || e.mcp_server || "(unknown)";
            if (!subgroups.has(key)) {
              subgroups.set(key, []);
              order.push(key);
            }
            subgroups.get(key).push(e);
          }
          for (const key of order) {
            const evs = subgroups.get(key);
            const latencies = evs
              .map((e) => e.latency_ms)
              .filter((v) => v != null);
            const docCount = evs.reduce(
              (acc, e) => acc + (typeof e.doc_count === "number" ? e.doc_count : 0),
              0
            );
            const body = evs.map((e) => _renderMcpEvent(e, expandedIds));
            mcpEvents.appendChild(
              _renderSubgroup({
                label: workerLabel(key),
                callCount: evs.length,
                latencyValues: latencies,
                extraSummary: docCount + " docs",
                key: "mcp:" + key,
                expandedIds,
                collapsedIds,
                body,
              })
            );
          }
        }
      }

      async function pollTrace(traceId, pollingId) {
        let consecutiveSameCount = 0;
        let lastCount = -1;
        let nextDelay = POLL_INTERVAL_MS;

        // First poll fires immediately so the operator doesn't stare at
        // an empty timeline for 2s when logs HAVE landed already.
        while (pollingId === activePollingId) {
          let resp;
          try {
            resp = await api("/trace/" + encodeURIComponent(traceId));
          } catch (err) {
            // api() throws "no token" if the operator cancelled the prompt
            // mid-poll. Reflect on the token pill and stop — getToken()
            // already set the pill to "missing". Bail without crashing.
            updateStatusPill("error", "no token");
            return;
          }
          // Re-check the polling id AFTER the await: a fresh Send may
          // have arrived while we were awaiting the network. Without
          // this guard, a slow response from the prior trace could stomp
          // the new trace's timeline.
          if (pollingId !== activePollingId) return;

          if (resp.status === 503) {
            // Trace endpoint times out (e.g. Cloud Logging slow). Soft
            // signal — keep polling at the backoff cadence.
            updateStatusPill("stalled", "stalled (logs slow)");
            nextDelay = POLL_BACKOFF_MS;
          } else if (!resp.ok) {
            updateStatusPill("error", "trace " + resp.status);
            return;
          } else {
            let payload;
            try {
              payload = await resp.json();
            } catch (err) {
              updateStatusPill("error", "bad trace payload");
              return;
            }
            if (pollingId !== activePollingId) return;
            const events = Array.isArray(payload.events) ? payload.events : [];
            renderTimeline(events);

            if (payload.complete === true) {
              updateStatusPill("complete", "complete");
              return;
            }
            // Stall detection: same event count for N polls AND not
            // complete. Soft warning — polling continues; the operator
            // can decide whether to refresh or wait.
            if (events.length === lastCount) {
              consecutiveSameCount += 1;
            } else {
              consecutiveSameCount = 0;
              lastCount = events.length;
            }
            if (consecutiveSameCount >= STALL_THRESHOLD) {
              updateStatusPill("stalled", "stalled (no new events)");
            } else if (events.length > 0) {
              updateStatusPill("streaming", "streaming");
            } else {
              updateStatusPill("pending", "pending");
            }
            nextDelay = POLL_INTERVAL_MS;
          }

          // Sleep with cancellation: re-check activePollingId after the
          // timer fires. A setTimeout-based sleep is the simplest way to
          // get a cancellable delay without AbortController gymnastics.
          await new Promise((r) => setTimeout(r, nextDelay));
        }
      }

      async function onSubmit(e) {
        e.preventDefault();
        const prompt = (promptInput.value || "").trim();
        if (!prompt) return; // empty prompt → no-op
        const workload = workloadSelect.value || "drift";

        // Bump the polling id — any in-flight loop from a prior Send
        // will see the mismatch on its next await boundary and exit.
        activePollingId += 1;
        const myPollingId = activePollingId;

        sendBtn.disabled = true;
        // Clear prior render so the operator isn't staring at a stale
        // trace_id / response while the new /chat is in flight. 19.B.4
        // fans this clear across all three group panes — leaving any one
        // populated would mix old-trace events into the new timeline.
        traceBadge.innerHTML = "";
        finalCard.hidden = true;
        finalCard.classList.remove("error");
        if (coordinatorEvents) coordinatorEvents.innerHTML = "";
        if (toolsEvents) toolsEvents.innerHTML = "";
        if (mcpEvents) mcpEvents.innerHTML = "";

        let resp;
        try {
          resp = await api("/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ prompt, workload }),
          });
        } catch (err) {
          // api() throws "no token" if the operator cancelled the prompt.
          // Token pill is already "missing"; surface in the response card
          // so the form doesn't appear dead.
          if (myPollingId === activePollingId) {
            showFinalResponse(
              "Cannot send: operator token missing. Click \"change token\" to set one.",
              { error: true }
            );
            sendBtn.disabled = false;
          }
          return;
        }
        // Race guard: a fresh Send may have incremented activePollingId
        // while /chat was in flight (e.g. button re-enabled by a previous
        // error branch). If so, drop this response — the newer Send owns
        // the UI state.
        if (myPollingId !== activePollingId) return;

        const traceId = resp.headers.get("X-Trace-Id") || "";
        let body;
        try {
          body = await resp.json();
        } catch (err) {
          body = null;
        }

        if (!resp.ok) {
          const detail =
            (body && (body.detail || body.error)) ||
            "chat request failed (" + resp.status + ")";
          showFinalResponse(String(detail), { error: true });
          // Still show the trace pill if we got one — operator can grep
          // the trace_id in Cloud Logging to diagnose the 5xx upstream.
          if (traceId) setTracePill(traceId);
          sendBtn.disabled = false;
          return;
        }

        // Success path: surface the reply immediately, then start polling
        // for the reasoning timeline.
        const reply =
          (body && (body.reply || body.response || body.text)) ||
          (typeof body === "string" ? body : JSON.stringify(body, null, 2));
        showFinalResponse(reply || "(empty reply)");
        setTracePill(traceId);
        if (timelineRoot) {
          const hint = document.createElement("div");
          hint.className = "timeline-hint";
          hint.textContent =
            "waiting for reasoning logs (typical lag ~15s)…";
          timelineRoot.appendChild(hint);
        }
        sendBtn.disabled = false;

        // 19.B.6: refresh the past-decisions rail so a fresh proposal
        // (especially a rollback that minted an approval_url) shows up
        // without a page reload. The hook is intentionally optional —
        // the rail's IIFE registers it on load, but 19.B.3 must not
        // crash if it ever runs before 19.B.6 is wired in.
        if (typeof window.driftscribe.reloadDecisions === "function") {
          window.driftscribe.reloadDecisions();
        }

        if (traceId) {
          // Fire and forget — pollTrace owns its own lifecycle via
          // activePollingId / myPollingId. Any exception inside pollTrace
          // updates the status pill; nothing here needs to await it.
          pollTrace(traceId, myPollingId).catch((err) => {
            updateStatusPill("error", "poll error");
          });
        } else {
          // No trace id on the response — degenerate path (middleware
          // misconfigured or test stub). Mark complete so the pill isn't
          // stuck on "pending" forever.
          updateStatusPill("complete", "complete (no trace_id)");
        }
      }

      if (form) form.addEventListener("submit", onSubmit);

      // 19.B.6: cancel the in-flight polling loop by bumping the monotonic
      // id. The loop checks ``pollingId === activePollingId`` at every await
      // boundary, so a single increment is enough to make every in-flight
      // iteration bail on its next tick. Used when entering historical-trace
      // mode (we don't want the prior live trace to keep stomping the
      // timeline behind a historical render).
      function cancelPolling() {
        activePollingId += 1;
      }

      // Expose for 19.B.4's three-group renderer to swap in without
      // restructuring the form/polling glue.
      window.driftscribe = Object.assign(window.driftscribe || {}, {
        pollTrace,
        renderTimeline,
        cancelPolling,
        // 19.B.6: surface the timeline-clear primitive so the historical
        // <-> live mode toggle can wipe state without duplicating the
        // three-group reset logic.
        clearTimeline: () => {
          if (coordinatorEvents) coordinatorEvents.innerHTML = "";
          if (toolsEvents) toolsEvents.innerHTML = "";
          if (mcpEvents) mcpEvents.innerHTML = "";
        },
        setStatusPill: updateStatusPill,
        setTracePill,
        showFinalResponse,
        hideFinalResponse: () => {
          finalCard.hidden = true;
          finalCard.classList.remove("error");
          finalCard.textContent = "";
        },
        clearTraceBadge: () => {
          traceBadge.innerHTML = "";
        },
      });
    })();

    // ----------------------------------------------------------------- //
    //  19.B.6: past-decisions pane + historical-trace navigation.        //
    //                                                                    //
    //  Two responsibilities:                                              //
    //                                                                    //
    //    1. Left rail: fetch /decisions?limit=50 on mount and after       //
    //       every successful /chat (19.B.3 fires reloadDecisions()).      //
    //       Each row shows ``<time> · <workload> · <action> · <trigger>`` //
    //       plus an [open trace →] button when ``decision.trace_id`` is   //
    //       present (pre-Phase-19 decisions lack the field — the button   //
    //       is hidden but the row still renders so the operator sees the  //
    //       historical action).                                            //
    //                                                                    //
    //    2. Historical-trace mode: clicking [open trace] fetches          //
    //       /trace/{trace_id} ONCE (no polling — historical traces are    //
    //       immutable) and hands events to renderTimeline. The form is    //
    //       dimmed and a "viewing historical trace <prefix>" banner is    //
    //       shown; "← new chat" restores live mode by clearing the        //
    //       timeline, hiding the banner, re-enabling the form.            //
    //                                                                    //
    //  Past-decision approval CTA (deferred from 19.B.5):                  //
    //    A rollback decision carries ``decision.approval = {               //
    //      approval_url, expires_at, ... }``. When ``approval_url``        //
    //    starts with "/approvals/" we render an inline "Approve →"        //
    //    button next to [open trace]. ``expires_at`` is parsed via        //
    //    new Date(...) — accepts ISO-8601 strings and Firestore           //
    //    DatetimeWithNanoseconds (serialized as ISO). If the parsed       //
    //    instant is in the past relative to ``Date.now()`` we strike      //
    //    the button through and append an "expired" badge — same          //
    //    same-origin guard as the in-timeline CTA from 19.B.5.            //
    //                                                                    //
    //  Mode-toggle invariants:                                            //
    //    * Entering historical mode: cancelPolling() + clearTimeline() +  //
    //      hideFinalResponse() + clearTraceBadge() so the live trace's    //
    //      pills don't leak into the historical view.                     //
    //    * Exiting historical mode: same wipe; the form re-enables and    //
    //      the operator can submit a fresh prompt.                         //
    //    * The decisions rail itself is preserved across mode toggles     //
    //      so the operator can hop between historical traces freely.      //
    // ----------------------------------------------------------------- //
    (function () {
      "use strict";
      const api = window.driftscribe.api;
      const renderTimeline = window.driftscribe.renderTimeline;
      const cancelPolling = window.driftscribe.cancelPolling;
      const clearTimeline = window.driftscribe.clearTimeline;
      const setStatusPill = window.driftscribe.setStatusPill;
      const setTracePill = window.driftscribe.setTracePill;
      const showFinalResponse = window.driftscribe.showFinalResponse;
      const hideFinalResponse = window.driftscribe.hideFinalResponse;
      const clearTraceBadge = window.driftscribe.clearTraceBadge;

      const decisionsList = document.getElementById("decisions-list");
      const historicalBadge = document.getElementById("historical-badge");
      const historicalTraceIdEl = document.getElementById("historical-trace-id");
      const newChatBtn = document.getElementById("new-chat-btn");
      const chatForm = document.getElementById("chat-form");
      const sendBtn = document.getElementById("send-btn");
      const promptInput = document.getElementById("prompt-input");
      const workloadSelect = document.getElementById("workload-select");

      // The id of the currently-displayed historical trace (or null when
      // the operator is in live/interactive mode). Used to toggle the
      // ``.active`` highlight on the corresponding rail row when the rail
      // re-renders after a chat.
      let activeHistoricalTraceId = null;

      function _fmtTime(value) {
        // ``created_at`` from /decisions is one of:
        //   * ISO-8601 string (FastAPI's default datetime serializer)
        //   * { seconds, nanoseconds } shape (Firestore DatetimeWith-
        //     Nanoseconds, serialized as a dict by some firestore SDK
        //     paths — we accept it defensively)
        //   * null / undefined (pre-Phase-19 docs that lack the field)
        if (!value) return "(no timestamp)";
        let d;
        if (typeof value === "string") {
          d = new Date(value);
        } else if (typeof value === "object" && value.seconds != null) {
          d = new Date(value.seconds * 1000);
        } else {
          d = new Date(value);
        }
        if (isNaN(d.getTime())) return "(bad timestamp)";
        // toLocaleString picks up the browser's locale + timezone — operator
        // sees decisions in their local time, which is what they want for a
        // chronological scan. UTC normalization is the BACKEND's job
        // (created_at is stored as UTC; the display side intentionally
        // localizes).
        return d.toLocaleString();
      }

      function _deriveWorkload(decision) {
        // ``workload`` is NOT a persisted field on the decision document
        // (see agent/main.py — only ``trigger`` and ``action`` are stored).
        // Derive a best-effort label from action prefixes so the rail row
        // matches the spec format "<time> · <workload> · <action> · <trigger>".
        // Upgrade-workload decisions use the ``upgrade_*`` action prefix
        // (see agent/upgrade_contract.py + DecisionAction enum).
        const a = String(decision.action || "");
        if (a.startsWith("upgrade_")) return "upgrade";
        return "drift";
      }

      function _isExpired(expires_at) {
        // ``expires_at`` formats mirror ``created_at``. A missing field is
        // treated as NOT expired (some older rollback decisions may omit
        // it; we'd rather show the button than spuriously gray it out).
        if (!expires_at) return false;
        let d;
        if (typeof expires_at === "string") {
          d = new Date(expires_at);
        } else if (typeof expires_at === "object" && expires_at.seconds != null) {
          d = new Date(expires_at.seconds * 1000);
        } else {
          d = new Date(expires_at);
        }
        if (isNaN(d.getTime())) return false;
        // Comparison is done in epoch-ms (UTC anchor) — completely
        // immune to the browser's display timezone. Only the display
        // side localizes.
        return d.getTime() < Date.now();
      }

      function _renderPastApprovalCta(approval) {
        // Defensive checks: ``approval`` is the decision's ``approval``
        // sub-object as returned by /decisions. Same same-origin guard
        // as 19.B.5's ``_renderApprovalCta`` — delegated to
        // :func:`_safeApprovalHref` which accepts BOTH relative
        // (``/approvals/<id>``) AND absolute coordinator URLs
        // (``https://<coordinator>/approvals/<id>``) — the rollback
        // worker emits the absolute form. Off-origin, javascript:,
        // data:, malformed, or missing → null (no CTA).
        if (!approval || typeof approval !== "object") return null;
        const url = approval.approval_url;
        const href = (typeof url === "string") ? _safeApprovalHref(url) : null;
        if (!href) {
          return null;
        }
        const expired = _isExpired(approval.expires_at);
        const a = document.createElement("a");
        a.className = "past-approve-btn" + (expired ? " expired" : "");
        a.href = href;
        a.target = "_blank";
        a.rel = "noopener";
        a.textContent = "Approve →";
        if (expired) {
          // Defense in depth: ``pointer-events: none`` is in the CSS,
          // but a keyboard-focused activation could still reach href.
          // Drop the href so even a Tab+Enter does nothing.
          a.removeAttribute("href");
          a.setAttribute("aria-disabled", "true");
        }
        return { node: a, expired };
      }

      function _renderRow(decision) {
        const li = document.createElement("li");
        li.className = "decision-row";
        // Phase 20.6.0: stable Playwright hook — renders as
        //   <li class="decision-row" data-testid="past-decision-item">
        li.setAttribute("data-testid", "past-decision-item");
        const traceId = decision.trace_id || "";
        if (traceId && traceId === activeHistoricalTraceId) {
          li.classList.add("active");
        }

        // Summary line: time · workload · action · trigger.
        const summary = document.createElement("div");
        summary.className = "row-summary";
        const meta = document.createElement("span");
        meta.className = "row-meta";
        meta.textContent = _fmtTime(decision.created_at);
        summary.appendChild(meta);
        // textContent (never innerHTML) for the user-derived bits — the
        // decision dict is server-trusted but the secret_guard redact
        // walker may leave through unusual UTF-8 in trigger strings.
        const rest = document.createTextNode(
          " · " +
            _deriveWorkload(decision) +
            " · " +
            String(decision.action || "(unknown)") +
            " · " +
            String(decision.trigger || "(no trigger)")
        );
        summary.appendChild(rest);
        li.appendChild(summary);

        // Action row: [open trace →] + optional [Approve →].
        const actions = document.createElement("div");
        actions.className = "row-actions";

        if (traceId) {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "open-trace-btn";
          // Phase 20.6.0: stable Playwright hook — renders as
          //   <button class="open-trace-btn" data-testid="open-trace-button">
          btn.setAttribute("data-testid", "open-trace-button");
          btn.textContent = "open trace →";
          btn.addEventListener("click", () => {
            openHistoricalTrace(traceId);
          });
          actions.appendChild(btn);
        }
        // (No button row entry when trace_id is absent — pre-Phase-19
        // decisions still show their summary line so the operator sees
        // the historical action, just without a deep-link.)

        const cta = _renderPastApprovalCta(decision.approval);
        if (cta) {
          actions.appendChild(cta.node);
          if (cta.expired) {
            const badge = document.createElement("span");
            badge.className = "expired-badge";
            badge.textContent = "expired";
            // ``title`` carries the raw expires_at for an operator who
            // hovers — useful when triaging a stale approval.
            const ea = decision.approval && decision.approval.expires_at;
            if (ea) badge.title = "expires_at: " + String(ea);
            actions.appendChild(badge);
          }
        }

        if (actions.childNodes.length > 0) {
          li.appendChild(actions);
        }
        return li;
      }

      async function loadDecisions() {
        if (!decisionsList) return;
        let resp;
        try {
          resp = await api("/decisions?limit=50");
        } catch (err) {
          // ``no token`` — the api() helper already reflected on the
          // token pill. Leave the rail untouched so the operator's last
          // good view persists across a token-rotation flow.
          return;
        }
        if (!resp.ok) {
          // Don't wipe the rail on a transient 5xx; surface a soft
          // placeholder only if we have NO rows to fall back to.
          if (decisionsList.children.length === 0) {
            decisionsList.innerHTML = "";
            const empty = document.createElement("li");
            empty.className = "decisions-empty";
            empty.textContent = "(failed to load decisions: " + resp.status + ")";
            decisionsList.appendChild(empty);
          }
          return;
        }
        let payload;
        try {
          payload = await resp.json();
        } catch (err) {
          return;
        }
        const decisions = (payload && Array.isArray(payload.decisions))
          ? payload.decisions
          : [];
        decisionsList.innerHTML = "";
        if (decisions.length === 0) {
          const empty = document.createElement("li");
          empty.className = "decisions-empty";
          empty.textContent = "(no decisions yet)";
          decisionsList.appendChild(empty);
          return;
        }
        for (const d of decisions) {
          decisionsList.appendChild(_renderRow(d));
        }
      }

      function _enterHistoricalMode(traceId) {
        // Step 1: cancel any in-flight live polling so it can't stomp the
        // historical render after it lands.
        if (typeof cancelPolling === "function") cancelPolling();
        // Step 2: wipe the live UI surfaces — final-response card, trace
