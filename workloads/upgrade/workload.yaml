# Upgrade workload manifest (Phase 17.A.1; fully wired in 17.C.4).
#
# Symbolic names only — same security model as workloads/drift/workload.yaml.
# The central registry (agent/workloads/registry.py) resolves each name
# to a real callable or WorkerEndpoint. URLs / secrets / repos /
# audiences NEVER appear in this file. Authority for ``target_repo`` /
# ``lockfile_path`` / ``advisory_source`` lives in
# ``UPGRADE_TARGET_REGISTRY`` (Phase 17.C.1 Codex blocker); the
# decision-rules contract at workloads/upgrade/contract.yaml references
# the entry by symbolic ``target_name``.
#
# Wiring history:
# - 17.A.1: manifest scaffolded; upgrade_* tools reserved as None in
#   TOOL_REGISTRY so load_workload("upgrade") raised
#   ReservedToolNotImplementedError.
# - 17.B.3: search_developer_docs / retrieve_developer_doc became real
#   callables (MCP attach).
# - 17.B.4 follow-up: session-state tools removed from this list
#   (still reserved in _TOOL_REGISTRY for the future session-memory
#   feature, but no workload enables them).
# - 17.C.4: upgrade_read_dependencies / upgrade_propose_pr flipped
#   from None to real authority-clean callables — load_workload now
#   succeeds end-to-end provided the worker URL env vars are set.
#   17.E owns UPGRADE_READER_URL / UPGRADE_DOCS_URL deploy wiring.

name: upgrade
# Operator-facing identity (Phase 17.G crew rename). "Patch" = the punchy,
# dev-native action word for keeping dependencies current. Despite this
# workload's ``observation_kind: repo_lockfile`` (intent), it is NOT
# autonomous in this build: ``/recheck workload=upgrade`` returns 503 and
# no trigger is wired — so it is on-demand / chat-only, and the descriptor
# stays always-visible to disambiguate "Patch" from HTTP PATCH. See
# ``AUTONOMOUS_TRIGGER_WORKLOADS`` in agent/main.py (Patch is NOT in it).
# Roadmap: wiring an autonomous trigger for Patch IS planned — a scheduled
# or advisory-feed ``/recheck`` observation loop, analogous to Anchor's
# Eventarc trigger. When it lands, register ``upgrade`` in
# ``AUTONOMOUS_TRIGGER_WORKLOADS`` and the operator-facing autonomy signal
# (crew-picker group/badge, GET /capabilities ``autonomous``) follows
# automatically. The README "Patch" section tracks this as future work.
display_name: Patch
descriptor: dependencies
description: >
  Checks the repo's package.json on demand for outdated dependencies
  (or vulnerable versions per advisory feeds) and proposes upgrade PRs.
  Scoped to npm package.json for now — Python/Rust/Go lockfiles
  aren't parsed yet.

# Relative to this workload's directory (workloads/upgrade/).
system_prompt_file: system_prompt.md

# Phase 17.C.4 (Option A): the /chat surface uses a separate
# upgrade-flavored prompt that explains the LLM-facing
# ``upgrade_read_dependencies`` / ``upgrade_propose_pr`` tools, MCP
# citation rule, and the four decision actions in operator-facing
# terms. Distinct from ``system_prompt.md`` above which is /recheck-
# focused (structured DecisionProposal JSON).
chat_system_prompt_file: chat_system_prompt.md

# Upgrade reads dependencies from a repo lockfile (the *observation*
# source), but the workload still has a YAML *contract* — the
# decision-rules file at workloads/upgrade/contract.yaml (Phase 17.C.1).
# The contract file carries decision thresholds (severity, version
# jump, requires_approval); authority fields (target_repo, lockfile_path,
# advisory_source) live in agent/workloads/registry.py::UPGRADE_TARGET_REGISTRY.
# See workloads/upgrade/contract.yaml header for the Codex 2026-05-20
# split rationale.
contract_file: contract.yaml

# Symbolic tool names. Every entry below resolves to a real callable
# in ``TOOL_REGISTRY`` as of 17.C.4 — the two ``upgrade_*`` tools
# flipped from None to authority-clean callables in this sub-phase
# (see ``agent.adk_tools.upgrade_read_dependencies_tool`` and
# ``agent.adk_tools.upgrade_propose_pr_tool``). The MCP tools shipped
# in 17.B.3; ``notify`` and ``search_recent_prs`` have always been
# real.
#
# Session-state tools are intentionally NOT listed (see header
# comment): they remain reserved in ``_TOOL_REGISTRY`` but no workload
# enables them today.
enabled_tool_names:
  - upgrade_read_dependencies
  - upgrade_propose_pr
  - upgrade_close_pr
  - upgrade_merge_pr
  - notify
  - search_recent_prs
  - search_developer_docs
  - retrieve_developer_doc
  # Cross-crew "team memory" — read what other crews discussed (read-only).
  - read_conversations

# Symbolic worker names. Drift workers are excluded — upgrade has its
# own reader/docs workers (different IAM, different repo path
# allowlist). Notifier is shared.
worker_names:
  - upgrade_reader
  - upgrade_docs
  - notifier

# Upgrade observes the repo's lockfile, not a Cloud Run env.
observation_kind: repo_lockfile

# Symbolic action names. Upgrade introduces upgrade_pr; docs_pr,
# escalation, and no_op are reused from the drift action vocabulary
# (the contract uses docs_pr for the "advisory exists but caller
# upgrades manually" path — see workloads/upgrade/contract.yaml).
action_names:
  - upgrade_pr
  - docs_pr
  - escalation
  - no_op
