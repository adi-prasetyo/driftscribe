# Canonical TARGETED deploy for the Phase C4 tofu-apply worker on
# driftscribe-hack-2026 (single-user portfolio). Operator runs by hand; there is
# NO CI trigger — this worker is the SOLE MUTATOR and is never auto-deployed.
#
# WHY THIS FILE EXISTS (same reason as cloudbuild.infra-reader.yaml):
#   The full infra/cloudbuild.yaml rebuilds + redeploys ALL images INCLUDING
#   payment-demo at a fresh tag, which moves payment-demo off the image tag Phase
#   A pinned into OpenTofu state and BREAKS the zero-diff. This file deploys ONLY
#   the tofu-apply worker.
#
# INGRESS — read carefully:
#   This deploys --no-allow-unauthenticated (ID-token-gated, reachable by an
#   authenticated operator/coordinator over the public URL) so the C4 live no-op
#   smoke can drive /propose + /apply via curl this session. The design (§2/§9)
#   requires PRIVATE ingress for the sole mutator: IMMEDIATELY AFTER the smoke,
#   redeploy with --ingress=internal (one flag) and remove any temporary invoker
#   grant. Under internal ingress the coordinator must reach it from inside the
#   VPC (a C5 egress concern). See docs/runbooks/tofu-apply.md.
#
# USAGE (operator runs by hand):
#   gcloud builds submit \
#     --config=infra/cloudbuild.tofu-apply.yaml \
#     --substitutions=_TAG=$(git rev-parse --short HEAD) \
#     --project=driftscribe-hack-2026
#
# PREREQUISITES (operator-side — docs/runbooks/tofu-apply.md §pre-flight):
#   1. infra/scripts/setup_iac_backend.sh has created tofu-apply-sa + its grants
#      (hardened-broad by default) + verified the KMS binding.
#   2. infra/scripts/setup_secrets.sh has created plan-hmac-key + bound the
#      secretAccessor + the Cloud Build actAs on tofu-apply-sa.
#   3. (editor IAM mode only) constraints/iam.disableServiceAccountKeyCreation
#      enforced on the project.

substitutions:
  _TAG: 'manual'
  _REGION: asia-northeast1
  # Full Cloud KMS key resource path for state/plan decryption. Passed to the
  # worker as TF_VAR_tofu_state_kms_key (a resource PATH, not key material — the
  # decrypt authority is the SA's cryptoKeyEncrypterDecrypter binding).
  _KMS_KEY: 'projects/driftscribe-hack-2026/locations/asia-northeast1/keyRings/driftscribe-tofu/cryptoKeys/tofu-state'

steps:
  # 1. Build + push ONLY the tofu-apply image (build context = repo root; the
  #    worker needs driftscribe_lib/ + iac/). The Dockerfile bakes a pinned,
  #    checksum-verified tofu binary + providers.
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - asia-northeast1-docker.pkg.dev/$PROJECT_ID/driftscribe/driftscribe-tofu-apply:${_TAG}
      - -f
      - workers/tofu_apply/Dockerfile
      - .
  - name: gcr.io/cloud-builders/docker
    args: ['push', 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/driftscribe/driftscribe-tofu-apply:${_TAG}']

  # 2. Deploy the worker. --no-allow-unauthenticated (ID-token auth) + the
  #    dedicated tofu-apply-sa + in-app ALLOWED_CALLERS naming the coordinator SA.
  #    PLAN_APPROVAL_HMAC_KEY is mounted from the plan-hmac-key secret. OWN_URL is
  #    a placeholder overwritten by step 3. concurrency=1/max-instances=1 so the
  #    GCS state lock is never self-contended. timeout=900 covers a cold start +
  #    tofu init/refresh/apply within one synchronous request.
  #    memory=2Gi/cpu=2: the apply path spawns `tofu` + the google provider
  #    plugin, which peaked at 539 MiB during the C4 live smoke and OOM-killed
  #    the container at Cloud Run's 512 MiB default — which ALSO orphaned the GCS
  #    state lock (a crash mid-`plan -refresh-only` leaves prod/default.tflock,
  #    needing a manual `tofu force-unlock`; see docs/runbooks/tofu-apply.md §5).
  #    2Gi gives ~4x headroom for a real (non-no-op) apply; 2 CPU speeds it up.
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - driftscribe-tofu-apply
      - --image=asia-northeast1-docker.pkg.dev/$PROJECT_ID/driftscribe/driftscribe-tofu-apply:${_TAG}
      - --region=${_REGION}
      - --no-allow-unauthenticated
      - --service-account=tofu-apply-sa@$PROJECT_ID.iam.gserviceaccount.com
      - --min-instances=0
      - --max-instances=1
      - --concurrency=1
      - --timeout=900
      - --memory=2Gi
      - --cpu=2
      - --set-env-vars=GCP_PROJECT=$PROJECT_ID,TARGET_REGION=${_REGION},OWN_URL=https://placeholder.invalid,COORDINATOR_URL=https://placeholder.invalid,ALLOWED_CALLERS=driftscribe-agent@$PROJECT_ID.iam.gserviceaccount.com,ARTIFACT_BUCKET=$PROJECT_ID-tofu-artifacts,TF_VAR_tofu_state_kms_key=${_KMS_KEY}
      - --set-secrets=PLAN_APPROVAL_HMAC_KEY=plan-hmac-key:latest

  # 3. Post-deploy: resolve the assigned URL + write it back into OWN_URL.
  #    Fail-closed if it can't be resolved (verify_caller would reject every audience).
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        URL=$$(gcloud run services describe driftscribe-tofu-apply \
          --region=${_REGION} --format='value(status.url)')
        if [ -z "$${URL}" ] || [ "$${URL}" = "https://placeholder.invalid" ]; then
          echo "ERROR: Could not resolve driftscribe-tofu-apply URL" >&2
          exit 1
        fi
        echo "Setting OWN_URL=$${URL} on driftscribe-tofu-apply"
        gcloud run services update driftscribe-tofu-apply \
          --region=${_REGION} \
          --update-env-vars=OWN_URL=$${URL}

images:
  - asia-northeast1-docker.pkg.dev/$PROJECT_ID/driftscribe/driftscribe-tofu-apply:${_TAG}
