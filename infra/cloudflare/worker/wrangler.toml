name = "driftscribe-proxy"
main = "src/proxy.js"
compatibility_date = "2026-05-01"
account_id = "7e8265bd122c779322afe1b236623346"

# Bind the Worker to all traffic on the gated subdomain. Cloudflare Access
# (configured separately) runs BEFORE the Worker. Outside the demo window
# the Worker only sees authenticated users; during the window a bypass
# policy lets anonymous traffic through and demo mode (below) takes over.
routes = [
  { pattern = "driftscribe.adp-app.com/*", zone_name = "adp-app.com" },
]

# Demo mode (hackathon judging window): "1" makes the Worker strip any
# browser-supplied X-DriftScribe-Token and inject the real one (from the
# DEMO_TOKEN secret) on an allowlist of read routes + POST /chat, so
# anonymous judges can use the UI while CF Access runs a bypass policy.
# Open/close the window by flipping this + `wrangler deploy`.
# One-time secret setup: `wrangler secret put DEMO_TOKEN` (secrets
# persist across deploys). See src/proxy.js for the allowlist.
[vars]
DEMO_MODE = "0"

# Per-IP rate limiter for the anonymous demo-mode POST /chat path
# (hackathon A.4 cost rail — a /chat run holds long Gemini calls, so it
# is the cost amplifier; the cheap read routes stay unthrottled). This
# is Cloudflare's Workers Rate Limiting API: per-colo and approximate,
# which is fine for an abuse rail. Only consulted when DEMO_MODE="1"
# AND the request is on the anonymous token-injection path — operators
# with a CF Access JWT are never throttled, and outside the window CF
# Access gates everything anyway. namespace_id is an arbitrary
# account-unique integer identifying this limiter's counter space.
[[unsafe.bindings]]
name = "CHAT_RATE_LIMIT"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 5, period = 60 }
