# Canonical incremental-update deploy path for the LIVE coordinator on
# driftscribe-hack-2026 (single-user portfolio).
#
# WHY THIS FILE EXISTS:
#   infra/cloudbuild.yaml is the FULL-STACK build (coordinator + all workers +
#   payment-demo). Running it just to ship a coordinator change rebuilds
#   payment-demo at a fresh image tag — moving it off the tag Phase A pinned
#   into OpenTofu state and BREAKING the zero-diff — and re-runs the whole
#   worker-URL sync dance.
#
#   This file is the narrow deploy path for the LIVE coordinator
#   (driftscribe-agent, which runs under its own driftscribe-agent@ runtime SA —
#   NOT the default compute SA): build the new coordinator image, then update
#   the existing revision template in place (image + env vars only). No worker
#   touches, no SA changes, no IAM dance. Preserves everything the live
#   coordinator already has.
#
# USAGE (operator runs by hand, no CI integration):
#
#   gcloud builds submit \
#     --config=infra/cloudbuild.coordinator-update.yaml \
#     --substitutions=_TAG=$(git rev-parse --short HEAD) \
#     --project=driftscribe-hack-2026
#
# To deploy with no traffic first (smoke-test before shifting):
#
#   gcloud builds submit \
#     --config=infra/cloudbuild.coordinator-update.yaml \
#     --substitutions=_TAG=$(git rev-parse --short HEAD),_NO_TRAFFIC=--no-traffic
#
#   gcloud run revisions list --service=driftscribe-agent ...
#   gcloud run services update-traffic driftscribe-agent --to-revisions=<rev>=100 ...

substitutions:
  _TAG: 'manual'
  # Region kept here (not hardcoded) so a future region migration is one
  # substitution rather than a search/replace.
  _REGION: asia-northeast1
  _SERVICE: driftscribe-agent
  # Empty default = deploy with traffic. Pass `_NO_TRAFFIC=--no-traffic`
  # to create the revision without serving it; then shift traffic
  # manually after smoke-testing.
  _NO_TRAFFIC: ''
  # Phase C5c — OPTIONAL Direct VPC egress path. All empty by default =
  # today's behaviour unchanged (no VPC attach, TOFU_APPLY_URL untouched). When
  # set together, the deploy step appends --network/--subnet/--vpc-egress and
  # --update-env-vars TOFU_APPLY_URL=... so the coordinator can reach the
  # internal-ingress workers. Each is appended only when non-empty (same
  # empty-arg-safety pattern as _NO_TRAFFIC). The staged LIVE rollout uses a
  # direct `gcloud run services update` (for tighter --no-traffic/--tag
  # control); this path keeps the documented deploy coherent. See
  # infra/scripts/setup_coordinator_vpc.sh.
  _VPC_NETWORK: ''
  _VPC_SUBNET: ''
  _VPC_EGRESS: ''
  _TOFU_APPLY_URL: ''
  # Phase D — OPTIONAL tofu-editor worker URL. Same empty-arg-safety: folded
  # into ENV_VARS only when non-empty (mirrors _TOFU_APPLY_URL). Set this so a
  # from-scratch coordinator deploy wires TOFU_EDITOR_URL and the agent can open
  # iac/ PRs via the credential-isolated editor (also clears the D2-1
  # GET /iac-apply/reachability "editor unreachable" warning). On the LIVE
  # coordinator it is currently set via a direct --update-env-vars and persists
  # across these incremental deploys; codifying it here keeps a from-scratch
  # rebuild from silently dropping it. See docs/runbooks/tofu-editor.md.
  _TOFU_EDITOR_URL: ''
  # Cloudflare Access integration (Phase 21). These are PUBLIC identifiers
  # (the AUD tag is the per-Application identifier shown in the CF
  # dashboard, the team domain is the hostname users see at sign-in) —
  # not secrets. See agent/cf_access.py and infra/cloudflare/.
  _CF_ACCESS_TEAM_DOMAIN: adp-app.cloudflareaccess.com
  _CF_ACCESS_AUD_TAG: 5e6a20fe63e5fb03a742eeb0623e216ad4c837413d2afa9885a79b1091016262
  # Phase C5e/C5g IaC operator-auth + merge config. AVAILABILITY-CRITICAL, so
  # codified here rather than set live-only (a fresh deploy that omitted them
  # would silently break the IaC approval flow): an empty COORDINATOR_ORIGIN
  # refuses EVERY approval POST (the CSRF Origin/Sec-Fetch-Site check in
  # agent/main.py fail-closes when unset), and an empty IAC_REQUIRED_CHECKS
  # DISABLES the IaC merge (merge_pr_at_sha refuses to merge an unchecked head).
  # All three are PUBLIC, non-secret values (an origin URL, CI check names, a
  # merge method) — safe to keep in the build config.
  _COORDINATOR_ORIGIN: 'https://driftscribe.adp-app.com'
  _IAC_REQUIRED_CHECKS: 'static-gate,tofu,lint-test'
  _IAC_MERGE_METHOD: 'squash'

# Default-compute-SA retirement (Phase 4): run this build as the dedicated
# cloudbuild-deploy-sa@ rather than the project's default compute SA, so the
# compute SA's roles/editor can be stripped (Phase 6). See
# docs/plans/2026-05-30-default-compute-sa-retirement.md. A user-specified
# serviceAccount REQUIRES an explicit logging option, so options.logging is set
# in the same block (CLOUD_LOGGING_ONLY — no default GCS logs bucket). Hardcoded
# to driftscribe-hack-2026: this file is operator-run on hack-2026 ONLY (no e2e
# / CI use), and the top-level serviceAccount field is not a documented
# substitution site, so a literal resource path is the safe form.
serviceAccount: 'projects/driftscribe-hack-2026/serviceAccounts/cloudbuild-deploy-sa@driftscribe-hack-2026.iam.gserviceaccount.com'
options:
  logging: CLOUD_LOGGING_ONLY

steps:
  # 1. Build the new coordinator image. Same Dockerfile + tag pattern as
  #    cloudbuild.yaml — only the image is rebuilt, no workers.
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - asia-northeast1-docker.pkg.dev/$PROJECT_ID/driftscribe/driftscribe-agent:${_TAG}
      - -f
      - Dockerfile.agent
      - .

  - name: gcr.io/cloud-builders/docker
    args: ['push', 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/driftscribe/driftscribe-agent:${_TAG}']

  # 2. Incremental update of the existing service. --update-env-vars (NOT
  #    --set-env-vars) adds the CF Access + IaC operator-auth/merge vars without
  #    clobbering DRY_RUN, GITHUB_REPO, TARGET_SERVICE, GITHUB_TOKEN secret refs,
  #    etc. The SA, ingress, scaling, and traffic policy all stay as they were.
  # bash entrypoint so we can conditionally append --no-traffic and the
  # optional Phase C5c VPC flags. An empty substitution passed as a positional
  # gcloud arg fails with "unrecognized arguments: <empty>", so we can't just
  # inline empty ${_VPC_*}; we build the arg list and only append each flag
  # when its substitution is non-empty (same empty-arg-safety as ${_NO_TRAFFIC}).
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        # Base env vars (CF Access + IaC operator-auth/merge config). gcloud's
        # default --update-env-vars delimiter is ",", but IAC_REQUIRED_CHECKS is
        # itself comma-separated (static-gate,tofu,lint-test), so we use the
        # "^@^" custom-delimiter form: the leading ^@^ makes "@" the separator
        # between K=V pairs, leaving commas safe inside values (none of these
        # values contain "@"). TOFU_APPLY_URL / TOFU_EDITOR_URL are folded in
        # below only when their substitution is set, so today's deploys leave
        # them untouched.
        # GOOGLE_CLOUD_LOCATION=global (NOT asia-northeast1): the coordinator
        # model (gemini-3.5-flash) is served only on Vertex's global endpoint;
        # global also returns the thought-SUMMARY parts the "Coordinator
        # reasoning" panel needs (Tokyo returned none even for the older 2.5
        # Flash). Folded into this update so the image + region land on ONE
        # revision (avoids a separate env-only revision). See infra/cloudbuild.yaml
        # for the full rationale; TARGET_REGION / Cloud Run --region stay asia-northeast1.
        ENV_VARS="^@^CF_ACCESS_TEAM_DOMAIN=${_CF_ACCESS_TEAM_DOMAIN}@CF_ACCESS_AUD_TAG=${_CF_ACCESS_AUD_TAG}@COORDINATOR_ORIGIN=${_COORDINATOR_ORIGIN}@IAC_REQUIRED_CHECKS=${_IAC_REQUIRED_CHECKS}@IAC_MERGE_METHOD=${_IAC_MERGE_METHOD}@GOOGLE_CLOUD_LOCATION=global"
        EXTRA_ARGS=()
        if [ -n "${_VPC_NETWORK}" ]; then
          EXTRA_ARGS+=(--network="${_VPC_NETWORK}")
        fi
        if [ -n "${_VPC_SUBNET}" ]; then
          EXTRA_ARGS+=(--subnet="${_VPC_SUBNET}")
        fi
        if [ -n "${_VPC_EGRESS}" ]; then
          EXTRA_ARGS+=(--vpc-egress="${_VPC_EGRESS}")
        fi
        if [ -n "${_TOFU_APPLY_URL}" ]; then
          ENV_VARS="$${ENV_VARS}@TOFU_APPLY_URL=${_TOFU_APPLY_URL}"
        fi
        if [ -n "${_TOFU_EDITOR_URL}" ]; then
          ENV_VARS="$${ENV_VARS}@TOFU_EDITOR_URL=${_TOFU_EDITOR_URL}"
        fi
        gcloud run services update ${_SERVICE} \
          --image=asia-northeast1-docker.pkg.dev/$PROJECT_ID/driftscribe/driftscribe-agent:${_TAG} \
          --update-env-vars="$${ENV_VARS}" \
          --region=${_REGION} \
          --project=$PROJECT_ID \
          "$${EXTRA_ARGS[@]}" \
          ${_NO_TRAFFIC}

images:
  - asia-northeast1-docker.pkg.dev/$PROJECT_ID/driftscribe/driftscribe-agent:${_TAG}
