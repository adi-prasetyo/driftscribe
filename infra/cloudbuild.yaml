# Cloud Build does NOT recursively expand substitutions inside other
# substitutions' values — built-ins like $PROJECT_ID stay literal if nested
# inside a user-defined sub. Inline $PROJECT_ID directly instead.
substitutions:
  # _TAG is overridden via `gcloud builds submit --substitutions=_TAG=<sha>`.
  # Default `manual` keeps the file valid when running from a local context
  # without a commit (e.g., uncommitted experiments).
  _TAG: 'manual'

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - asia-northeast1-docker.pkg.dev/$PROJECT_ID/driftscribe/driftscribe-agent:${_TAG}
      - -f
      - Dockerfile.agent
      - .
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - asia-northeast1-docker.pkg.dev/$PROJECT_ID/driftscribe/payment-demo:${_TAG}
      - -f
      - demo/Dockerfile
      - demo
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - asia-northeast1-docker.pkg.dev/$PROJECT_ID/driftscribe/driftscribe-reader:${_TAG}
      - -f
      - workers/reader/Dockerfile
      # Build context is the repo root so COPY driftscribe_lib/ resolves —
      # the worker's Dockerfile lives at workers/reader/Dockerfile but
      # depends on driftscribe_lib/ at the project root.
      - .
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - asia-northeast1-docker.pkg.dev/$PROJECT_ID/driftscribe/driftscribe-docs:${_TAG}
      - -f
      - workers/docs/Dockerfile
      # Same build-context-at-repo-root rationale as the reader above.
      - .
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - asia-northeast1-docker.pkg.dev/$PROJECT_ID/driftscribe/driftscribe-rollback:${_TAG}
      - -f
      - workers/rollback/Dockerfile
      # Same build-context-at-repo-root rationale as the reader above.
      - .
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - asia-northeast1-docker.pkg.dev/$PROJECT_ID/driftscribe/driftscribe-notifier:${_TAG}
      - -f
      - workers/notifier/Dockerfile
      # Same build-context-at-repo-root rationale as the reader above.
      - .
  # Upgrade workers (Phase 17.C.2 + 17.C.3). Same build-context-at-repo-root
  # rationale as the drift workers above; both upgrade workers also depend
  # on driftscribe_lib/ at the project root for auth/logging.
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - asia-northeast1-docker.pkg.dev/$PROJECT_ID/driftscribe/driftscribe-upgrade-reader:${_TAG}
      - -f
      - workers/upgrade_reader/Dockerfile
      - .
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - asia-northeast1-docker.pkg.dev/$PROJECT_ID/driftscribe/driftscribe-upgrade-docs:${_TAG}
      - -f
      - workers/upgrade_docs/Dockerfile
      - .
  - name: gcr.io/cloud-builders/docker
    args: ['push', 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/driftscribe/driftscribe-agent:${_TAG}']
  - name: gcr.io/cloud-builders/docker
    args: ['push', 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/driftscribe/payment-demo:${_TAG}']
  - name: gcr.io/cloud-builders/docker
    args: ['push', 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/driftscribe/driftscribe-reader:${_TAG}']
  - name: gcr.io/cloud-builders/docker
    args: ['push', 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/driftscribe/driftscribe-docs:${_TAG}']
  - name: gcr.io/cloud-builders/docker
    args: ['push', 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/driftscribe/driftscribe-rollback:${_TAG}']
  - name: gcr.io/cloud-builders/docker
    args: ['push', 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/driftscribe/driftscribe-notifier:${_TAG}']
  - name: gcr.io/cloud-builders/docker
    args: ['push', 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/driftscribe/driftscribe-upgrade-reader:${_TAG}']
  - name: gcr.io/cloud-builders/docker
    args: ['push', 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/driftscribe/driftscribe-upgrade-docs:${_TAG}']

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - payment-demo
      - --image=asia-northeast1-docker.pkg.dev/$PROJECT_ID/driftscribe/payment-demo:${_TAG}
      - --region=asia-northeast1
      - --allow-unauthenticated
      - --min-instances=0
      - --max-instances=1
      - --concurrency=1
      - --set-env-vars=PAYMENT_MODE=mock,FEATURE_NEW_CHECKOUT=false

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - driftscribe-agent
      - --image=asia-northeast1-docker.pkg.dev/$PROJECT_ID/driftscribe/driftscribe-agent:${_TAG}
      - --region=asia-northeast1
      # SECURITY: live demo runs DRY_RUN=true + --allow-unauthenticated
      # (Option C from Phase 8 plan). Flip to DRY_RUN=false ONLY after adding
      # the X-DriftScribe-Token guard (Option A) or removing
      # --allow-unauthenticated in favor of IAM-authenticated invocation
      # (Option B). As of Phase 11.1 the X-DriftScribe-Token guard is in
      # place on /recheck and /chat, so --allow-unauthenticated here means
      # "Cloud Run accepts the TCP connection; the app rejects unauthorized
      # requests at 401". The HMAC-signed approval URLs are accessible
      # without the token by design (single-use, 15-min TTL, audience-
      # bound — see /approve and /reject in agent/main.py).
      - --allow-unauthenticated
      # Phase 11.8: coordinator runs under its own dedicated SA
      # (NOT the default compute SA). This is the email every worker's
      # ALLOWED_CALLERS env lists. Worker → coordinator invocation does
      # not exist by design; coordinator → worker uses audience-bound
      # ID tokens minted from this SA's identity.
      - --service-account=driftscribe-agent@$PROJECT_ID.iam.gserviceaccount.com
      - --min-instances=0
      - --max-instances=1
      - --concurrency=1
      # USE_ADK is FALSE by default so a fresh `gcloud builds submit` doesn't
      # silently restore the ADK path before the operator has confirmed Vertex
      # AI quota. Flip on a running revision with:
      #   gcloud run services update driftscribe-agent --update-env-vars=USE_ADK=true
      # ...after verifying Vertex AI `generate-content` quota for
      # gemini-2.5-flash in asia-northeast1 (GCP Console → Vertex AI → Quotas),
      # then run the Beat C smoke test before recording the demo video.
      #
      # READER_URL / DOCS_URL / ROLLBACK_URL / NOTIFIER_URL are placeholders;
      # the post-deploy step at the END of this build reads each worker's
      # assigned URL (via gcloud run services describe) and writes them back
      # via --update-env-vars. The placeholder ensures the coordinator's
      # worker_client._worker_url() fails-closed at 503 if the post-deploy
      # never runs (rather than silently hitting placeholder.invalid).
      # GOOGLE_GENAI_USE_VERTEXAI / GOOGLE_CLOUD_PROJECT / GOOGLE_CLOUD_LOCATION
      # (Phase 14.5) flip the google-genai SDK from AI Studio (API-key auth)
      # to Vertex AI (ADC via the coordinator's runtime SA). These are stamped
      # at deploy time, not post-deploy — they don't depend on any worker URL.
      - --set-env-vars=DRY_RUN=true,GCP_PROJECT=$PROJECT_ID,TARGET_SERVICE=payment-demo,TARGET_REGION=asia-northeast1,GITHUB_REPO=adi-prasetyo/driftscribe,USE_ADK=false,DEBUG_CONFIG_URL=https://payment-demo-u272wv52kq-an.a.run.app/debug/config,READER_URL=https://placeholder.invalid,DOCS_URL=https://placeholder.invalid,ROLLBACK_URL=https://placeholder.invalid,NOTIFIER_URL=https://placeholder.invalid,UPGRADE_READER_URL=https://placeholder.invalid,UPGRADE_DOCS_URL=https://placeholder.invalid,GOOGLE_GENAI_USE_VERTEXAI=true,GOOGLE_CLOUD_PROJECT=$PROJECT_ID,GOOGLE_CLOUD_LOCATION=asia-northeast1
      # DRIFTSCRIBE_TOKEN (Phase 11.1) gates /recheck via the X-DriftScribe-Token
      # header. The `coordinator-shared-token` secret MUST exist in Secret
      # Manager BEFORE the first build that includes this line — Cloud Run
      # validates secret references at deploy time and fails the revision with
      # `INVALID_ARGUMENT: Revision is not ready... Secret not found` if the
      # resource is missing. The 503 fail-closed in agent/auth.py only kicks in
      # if DRIFTSCRIBE_TOKEN is empty at runtime (e.g., an operator removed
      # this --set-secrets line). See docs/architecture/multi-agent-design.md §2.
      #
      # DEVELOPER_KNOWLEDGE_API_KEY (Phase 17.B) feeds the X-Goog-Api-Key
      # header on every MCP request to https://developerknowledge.googleapis.com/mcp
      # from agent/mcp/developer_knowledge.py. Same Secret-Manager-must-exist-
      # at-deploy rule as the two above: if developer-knowledge-api-key is
      # missing in Secret Manager when this build runs, the coordinator
      # revision fails INVALID_ARGUMENT. The MCP wrapper fail-closes with
      # ConfigError at boot if the env is empty at runtime.
      - --set-secrets=GITHUB_TOKEN=github-pat:latest,DRIFTSCRIBE_TOKEN=coordinator-shared-token:latest,DEVELOPER_KNOWLEDGE_API_KEY=developer-knowledge-api-key:latest

  # Reader Agent (Phase 11.3) — worker #1 of 4. Read-only state extraction.
  # Layer 1: reader-agent-sa has only roles/run.viewer at the project.
  # Layer 3: --no-allow-unauthenticated forces ID-token auth; the worker
  # ALSO enforces an in-app allowlist via driftscribe_lib.auth.verify_caller.
  #
  # Two-step OWN_URL pattern: Cloud Run assigns the service URL during the
  # first deploy, but verify_caller() needs to know it ahead of time to
  # validate the audience claim. We bootstrap with a placeholder URL on the
  # initial deploy step, then immediately follow up with a gcloud `services
  # update` that reads the assigned URL and writes it back into OWN_URL.
  # Both steps run in EVERY build, so subsequent redeploys keep OWN_URL in
  # sync even if the URL ever rotates (e.g., region migration).
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - driftscribe-reader
      - --image=asia-northeast1-docker.pkg.dev/$PROJECT_ID/driftscribe/driftscribe-reader:${_TAG}
      - --region=asia-northeast1
      - --no-allow-unauthenticated
      - --service-account=reader-agent-sa@$PROJECT_ID.iam.gserviceaccount.com
      - --min-instances=0
      - --max-instances=1
      - --concurrency=1
      # OWN_URL placeholder — overwritten by the next step in this same
      # build. If the next step fails, the revision will not serve requests
      # successfully (verify_caller rejects every audience), which is the
      # desired fail-closed behavior.
      - --set-env-vars=GCP_PROJECT=$PROJECT_ID,TARGET_SERVICE=payment-demo,TARGET_REGION=asia-northeast1,OWN_URL=https://placeholder.invalid,ALLOWED_CALLERS=driftscribe-agent@$PROJECT_ID.iam.gserviceaccount.com

  # Post-deploy: read the assigned URL and write it back into OWN_URL.
  # `gcloud run services update --update-env-vars` patches the env block
  # without re-rolling the image, so it's cheap and atomic.
  #
  # Shell `$` references are doubled (`$$`) so Cloud Build's pre-processor
  # leaves them alone — Cloud Build expands `$VAR` and `${VAR}` against its
  # own substitutions namespace before the bash script runs.
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        URL=$$(gcloud run services describe driftscribe-reader \
          --region=asia-northeast1 --format='value(status.url)')
        if [ -z "$${URL}" ] || [ "$${URL}" = "https://placeholder.invalid" ]; then
          echo "ERROR: Could not resolve driftscribe-reader URL" >&2
          exit 1
        fi
        echo "Setting OWN_URL=$${URL} on driftscribe-reader"
        gcloud run services update driftscribe-reader \
          --region=asia-northeast1 \
          --update-env-vars=OWN_URL=$${URL}

  # Docs Agent (Phase 11.4) — worker #2 of 4. Scoped GitHub PR creator.
  # Layer 1: docs-agent-sa has NO project-level GCP grants. Its only
  # privilege is access to the docs-agent-github-pat Secret Manager secret
  # (per-secret binding). The PAT itself is a fine-grained GitHub token
  # scoped to a single repository (adi-prasetyo/driftscribe) with
  # Contents+PR write only — no org / admin / other-repo access.
  # Layer 3: --no-allow-unauthenticated forces ID-token auth; the worker
  # ALSO enforces an in-app caller email allowlist via verify_caller.
  #
  # Same two-step OWN_URL pattern as the reader (see note above).
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - driftscribe-docs
      - --image=asia-northeast1-docker.pkg.dev/$PROJECT_ID/driftscribe/driftscribe-docs:${_TAG}
      - --region=asia-northeast1
      - --no-allow-unauthenticated
      - --service-account=docs-agent-sa@$PROJECT_ID.iam.gserviceaccount.com
      - --min-instances=0
      - --max-instances=1
      - --concurrency=1
      # OWN_URL placeholder — overwritten by the next step in this same
      # build. If the next step fails, verify_caller rejects every audience
      # (fail-closed). TARGET_REPO is the hardcoded repo for Layer 2 policy
      # — the worker refuses any caller-supplied repo field.
      - --set-env-vars=GCP_PROJECT=$PROJECT_ID,TARGET_REPO=adi-prasetyo/driftscribe,OWN_URL=https://placeholder.invalid,ALLOWED_CALLERS=driftscribe-agent@$PROJECT_ID.iam.gserviceaccount.com
      # The docs-agent-github-pat secret MUST exist in Secret Manager BEFORE
      # the first build that includes this line (same rationale as the
      # coordinator-shared-token in the coordinator deploy step above).
      - --set-secrets=GITHUB_TOKEN=docs-agent-github-pat:latest

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        URL=$$(gcloud run services describe driftscribe-docs \
          --region=asia-northeast1 --format='value(status.url)')
        if [ -z "$${URL}" ] || [ "$${URL}" = "https://placeholder.invalid" ]; then
          echo "ERROR: Could not resolve driftscribe-docs URL" >&2
          exit 1
        fi
        echo "Setting OWN_URL=$${URL} on driftscribe-docs"
        gcloud run services update driftscribe-docs \
          --region=asia-northeast1 \
          --update-env-vars=OWN_URL=$${URL}

  # Rollback Agent (Phase 11.5) — worker #3 of 4. HITL-gated traffic rollback.
  # Layer 1: rollback-agent-sa has resource-scoped roles/run.developer on
  # payment-demo ONLY (NOT project-wide — granted via
  # `gcloud run services add-iam-policy-binding payment-demo ...`).
  # Project-level roles/datastore.user is an acknowledged constraint
  # (Firestore lacks collection-scope IAM); bounded by the application
  # only ever touching the `approvals/` collection.
  # Layer 3: --no-allow-unauthenticated forces ID-token auth; the worker
  # ALSO enforces an in-app caller email allowlist via verify_caller.
  # Layer 4: HITL approval — single-use HMAC-bound token, 15-min TTL,
  # transactional pending→used flip. See driftscribe_lib/approvals.py.
  #
  # Two URLs need to be re-synced after the first deploy:
  #   - OWN_URL: this service's own assigned URL (audience claim).
  #   - COORDINATOR_URL: the driftscribe-agent service's URL — used to
  #     construct the approval_url returned in /propose responses. The
  #     coordinator hosts the approval UI (Phase 11.7), not this worker.
  # The approval-hmac-key secret MUST exist in Secret Manager BEFORE the
  # first build that includes this line (same rationale as the other
  # secret references above).
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - driftscribe-rollback
      - --image=asia-northeast1-docker.pkg.dev/$PROJECT_ID/driftscribe/driftscribe-rollback:${_TAG}
      - --region=asia-northeast1
      - --no-allow-unauthenticated
      - --service-account=rollback-agent-sa@$PROJECT_ID.iam.gserviceaccount.com
      - --min-instances=0
      - --max-instances=1
      - --concurrency=1
      # OWN_URL + COORDINATOR_URL are placeholders — both are overwritten
      # by the next step in this same build. If that step fails,
      # verify_caller rejects every audience (fail-closed) AND
      # approval_url in /propose responses points at the invalid host
      # (operator sees a broken link rather than being routed to an
      # attacker-controlled domain).
      - --set-env-vars=GCP_PROJECT=$PROJECT_ID,TARGET_SERVICE=payment-demo,TARGET_REGION=asia-northeast1,OWN_URL=https://placeholder.invalid,COORDINATOR_URL=https://placeholder.invalid,ALLOWED_CALLERS=driftscribe-agent@$PROJECT_ID.iam.gserviceaccount.com
      - --set-secrets=APPROVAL_HMAC_KEY=approval-hmac-key:latest

  # Post-deploy: read this service's URL AND the coordinator's URL, write
  # both back. The coordinator URL is the driftscribe-agent service's URL
  # (which was set earlier in this same build by its own deploy step).
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        URL=$$(gcloud run services describe driftscribe-rollback \
          --region=asia-northeast1 --format='value(status.url)')
        if [ -z "$${URL}" ] || [ "$${URL}" = "https://placeholder.invalid" ]; then
          echo "ERROR: Could not resolve driftscribe-rollback URL" >&2
          exit 1
        fi
        COORD_URL=$$(gcloud run services describe driftscribe-agent \
          --region=asia-northeast1 --format='value(status.url)')
        if [ -z "$${COORD_URL}" ] || [ "$${COORD_URL}" = "https://placeholder.invalid" ]; then
          echo "ERROR: Could not resolve driftscribe-agent (coordinator) URL" >&2
          exit 1
        fi
        echo "Setting OWN_URL=$${URL} and COORDINATOR_URL=$${COORD_URL} on driftscribe-rollback"
        gcloud run services update driftscribe-rollback \
          --region=asia-northeast1 \
          --update-env-vars=OWN_URL=$${URL},COORDINATOR_URL=$${COORD_URL}

  # Notifier Agent (Phase 11.6) — worker #4 of 4. URL-locked webhook poster.
  # Layer 1: notifier-agent-sa has NO project-level GCP role grants. Its
  # ONLY privilege is roles/secretmanager.secretAccessor on the
  # driftscribe-webhook-url secret (per-secret binding). It cannot read
  # Cloud Run state, Firestore, GitHub, or any other secret. See
  # docs/architecture/iam-matrix.md for the full negative-space audit.
  # Layer 2: caller cannot supply or override the outbound URL — it comes
  # from the env-injected secret at boot. NotifyRequest's extra="forbid"
  # rejects any caller-supplied url field at 422 before httpx is touched.
  # Layer 3: --no-allow-unauthenticated forces ID-token auth; the worker
  # ALSO enforces an in-app caller email allowlist via verify_caller.
  #
  # Same two-step OWN_URL pattern as the reader/docs/rollback (see notes
  # above). The driftscribe-webhook-url secret MUST exist in Secret
  # Manager BEFORE the first build that includes this line — Cloud Run
  # validates the --set-secrets reference at deploy time and fails the
  # revision with INVALID_ARGUMENT if the resource is missing.
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - driftscribe-notifier
      - --image=asia-northeast1-docker.pkg.dev/$PROJECT_ID/driftscribe/driftscribe-notifier:${_TAG}
      - --region=asia-northeast1
      - --no-allow-unauthenticated
      - --service-account=notifier-agent-sa@$PROJECT_ID.iam.gserviceaccount.com
      - --min-instances=0
      - --max-instances=1
      - --concurrency=1
      # OWN_URL placeholder — overwritten by the next step in this same
      # build. If the next step fails, verify_caller rejects every
      # audience (fail-closed).
      - --set-env-vars=GCP_PROJECT=$PROJECT_ID,OWN_URL=https://placeholder.invalid,ALLOWED_CALLERS=driftscribe-agent@$PROJECT_ID.iam.gserviceaccount.com
      - --set-secrets=NOTIFY_WEBHOOK_URL=driftscribe-webhook-url:latest

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        URL=$$(gcloud run services describe driftscribe-notifier \
          --region=asia-northeast1 --format='value(status.url)')
        if [ -z "$${URL}" ] || [ "$${URL}" = "https://placeholder.invalid" ]; then
          echo "ERROR: Could not resolve driftscribe-notifier URL" >&2
          exit 1
        fi
        echo "Setting OWN_URL=$${URL} on driftscribe-notifier"
        gcloud run services update driftscribe-notifier \
          --region=asia-northeast1 \
          --update-env-vars=OWN_URL=$${URL}

  # Upgrade Reader (Phase 17.C.2) — upgrade workload's read-side worker.
  # Layer 1: upgrade-reader-sa has no project-level GCP role grants. Its
  # ONLY privilege is roles/secretmanager.secretAccessor on the
  # upgrade-reader-github-pat secret (per-secret binding). Cannot read
  # Cloud Run, Firestore, MCP, or any other secret.
  # Layer 2: UPGRADE_TARGET_REPO env-pinned at boot — request body's
  # target_repo is re-validated against this value BEFORE any GitHub call.
  # lockfile_path matches the strict regex demo/upgrade-target/package.json
  # with a dual traversal guard. Worker isolation invariant: workers MUST
  # NOT import agent.* modules — enforced by subprocess-based test.
  # Layer 3: --no-allow-unauthenticated + in-app verify_caller (audience +
  # caller email allowlist).
  #
  # Same two-step OWN_URL pattern as the drift workers. The
  # upgrade-reader-github-pat secret MUST exist in Secret Manager before
  # the first build that includes this step.
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - driftscribe-upgrade-reader
      - --image=asia-northeast1-docker.pkg.dev/$PROJECT_ID/driftscribe/driftscribe-upgrade-reader:${_TAG}
      - --region=asia-northeast1
      - --no-allow-unauthenticated
      - --service-account=upgrade-reader-sa@$PROJECT_ID.iam.gserviceaccount.com
      - --min-instances=0
      - --max-instances=1
      - --concurrency=1
      # UPGRADE_TARGET_REPO is the env-pinned authority for the upgrade
      # workload (Phase 17.C.2). The CI guard test
      # tests/integration/test_upgrade_deploy_pin.py asserts the registry
      # value matches both upgrade workers' lockfile regex. The hardcoded
      # value here MUST match
      # UPGRADE_TARGET_REGISTRY["phase17_demo"].target_repo in
      # agent/workloads/registry.py.
      - --set-env-vars=GCP_PROJECT=$PROJECT_ID,UPGRADE_TARGET_REPO=adi-prasetyo/driftscribe,OWN_URL=https://placeholder.invalid,ALLOWED_CALLERS=driftscribe-agent@$PROJECT_ID.iam.gserviceaccount.com
      - --set-secrets=GITHUB_TOKEN=upgrade-reader-github-pat:latest

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        URL=$$(gcloud run services describe driftscribe-upgrade-reader \
          --region=asia-northeast1 --format='value(status.url)')
        if [ -z "$${URL}" ] || [ "$${URL}" = "https://placeholder.invalid" ]; then
          echo "ERROR: Could not resolve driftscribe-upgrade-reader URL" >&2
          exit 1
        fi
        echo "Setting OWN_URL=$${URL} on driftscribe-upgrade-reader"
        gcloud run services update driftscribe-upgrade-reader \
          --region=asia-northeast1 \
          --update-env-vars=OWN_URL=$${URL}

  # Upgrade Docs (Phase 17.C.3 + 17.C.3a) — upgrade workload's write-side
  # worker. Bumps a named npm dep's version in the pinned lockfile and
  # opens a PR.
  # Layer 1: upgrade-docs-sa has only roles/secretmanager.secretAccessor
  # on upgrade-docs-github-pat. PAT is fine-grained: Contents: Read & write
  # + Pull requests: Read & write on adi-prasetyo/driftscribe ONLY.
  # Layer 2: same UPGRADE_TARGET_REPO env pin as the upgrade reader, plus
  # branch must start with "upgrade/", base hardcoded to "main", title
  # must start with "upgrade", mutation surface restricted to
  # dependencies[package_name].
  # Layer 3 (post-LLM validator, Phase 17.C.3a): semver no-downgrade,
  # patch/minor only (major bumps refused with 403 → escalation), GHSA
  # URL shape, package existence in current lockfile.
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - driftscribe-upgrade-docs
      - --image=asia-northeast1-docker.pkg.dev/$PROJECT_ID/driftscribe/driftscribe-upgrade-docs:${_TAG}
      - --region=asia-northeast1
      - --no-allow-unauthenticated
      - --service-account=upgrade-docs-sa@$PROJECT_ID.iam.gserviceaccount.com
      - --min-instances=0
      - --max-instances=1
      - --concurrency=1
      - --set-env-vars=GCP_PROJECT=$PROJECT_ID,UPGRADE_TARGET_REPO=adi-prasetyo/driftscribe,OWN_URL=https://placeholder.invalid,ALLOWED_CALLERS=driftscribe-agent@$PROJECT_ID.iam.gserviceaccount.com
      - --set-secrets=GITHUB_TOKEN=upgrade-docs-github-pat:latest

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        URL=$$(gcloud run services describe driftscribe-upgrade-docs \
          --region=asia-northeast1 --format='value(status.url)')
        if [ -z "$${URL}" ] || [ "$${URL}" = "https://placeholder.invalid" ]; then
          echo "ERROR: Could not resolve driftscribe-upgrade-docs URL" >&2
          exit 1
        fi
        echo "Setting OWN_URL=$${URL} on driftscribe-upgrade-docs"
        gcloud run services update driftscribe-upgrade-docs \
          --region=asia-northeast1 \
          --update-env-vars=OWN_URL=$${URL}

  # Final post-deploy: sync the six worker URLs onto the coordinator.
  # The coordinator's worker_client uses these URLs as the audience claim
  # when minting ID tokens — getting them wrong makes every worker call
  # 401 at the worker's verify_caller dependency, which is the desired
  # fail-closed behavior if this step is ever skipped.
  #
  # Runs LAST because each worker's URL must be known (i.e., its own
  # deploy step must have completed) before we can resolve and stamp
  # it onto the coordinator. The worker deploys above use a placeholder
  # URL pattern that is itself patched by their respective post-deploy
  # bash steps; this coordinator-side step is a third tier in that
  # chain.
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        READER_URL=$$(gcloud run services describe driftscribe-reader \
          --region=asia-northeast1 --format='value(status.url)')
        DOCS_URL=$$(gcloud run services describe driftscribe-docs \
          --region=asia-northeast1 --format='value(status.url)')
        ROLLBACK_URL=$$(gcloud run services describe driftscribe-rollback \
          --region=asia-northeast1 --format='value(status.url)')
        NOTIFIER_URL=$$(gcloud run services describe driftscribe-notifier \
          --region=asia-northeast1 --format='value(status.url)')
        UPGRADE_READER_URL=$$(gcloud run services describe driftscribe-upgrade-reader \
          --region=asia-northeast1 --format='value(status.url)')
        UPGRADE_DOCS_URL=$$(gcloud run services describe driftscribe-upgrade-docs \
          --region=asia-northeast1 --format='value(status.url)')
        for var in READER_URL DOCS_URL ROLLBACK_URL NOTIFIER_URL UPGRADE_READER_URL UPGRADE_DOCS_URL; do
          val=$$(eval echo "\$$$$var")
          if [ -z "$${val}" ] || [ "$${val}" = "https://placeholder.invalid" ]; then
            echo "ERROR: Could not resolve $${var}" >&2
            exit 1
          fi
        done
        echo "Setting worker URLs on driftscribe-agent:"
        echo "  READER_URL=$${READER_URL}"
        echo "  DOCS_URL=$${DOCS_URL}"
        echo "  ROLLBACK_URL=$${ROLLBACK_URL}"
        echo "  NOTIFIER_URL=$${NOTIFIER_URL}"
        echo "  UPGRADE_READER_URL=$${UPGRADE_READER_URL}"
        echo "  UPGRADE_DOCS_URL=$${UPGRADE_DOCS_URL}"
        # Phase 14.3: the coordinator's own URL is the audience claim
        # /eventarc verifies Eventarc-minted ID tokens against. Resolve
        # it here and stamp it as EVENTARC_AUDIENCE in the same update
        # call. If the describe returns empty, fail-closed (the /eventarc
        # handler's 503-on-empty canary already covers the missing-env
        # case at runtime; this exits 1 at build time so the operator
        # sees the problem before Eventarc starts delivering events).
        COORD_URL=$$(gcloud run services describe driftscribe-agent \
          --region=asia-northeast1 --format='value(status.url)')
        if [ -z "$${COORD_URL}" ]; then
          echo "ERROR: Could not resolve driftscribe-agent URL for EVENTARC_AUDIENCE" >&2
          exit 1
        fi
        echo "  EVENTARC_AUDIENCE=$${COORD_URL}"
        gcloud run services update driftscribe-agent \
          --region=asia-northeast1 \
          --update-env-vars=READER_URL=$${READER_URL},DOCS_URL=$${DOCS_URL},ROLLBACK_URL=$${ROLLBACK_URL},NOTIFIER_URL=$${NOTIFIER_URL},UPGRADE_READER_URL=$${UPGRADE_READER_URL},UPGRADE_DOCS_URL=$${UPGRADE_DOCS_URL},EVENTARC_AUDIENCE=$${COORD_URL}

images:
