# Cloud Build does NOT recursively expand substitutions inside other
# substitutions' values — built-ins like $PROJECT_ID stay literal if nested
# inside a user-defined sub. Inline $PROJECT_ID directly instead.
substitutions:
  # _TAG is overridden via `gcloud builds submit --substitutions=_TAG=<sha>`.
  # Default `manual` keeps the file valid when running from a local context
  # without a commit (e.g., uncommitted experiments).
  _TAG: 'manual'

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - asia-northeast1-docker.pkg.dev/$PROJECT_ID/driftscribe/driftscribe-agent:${_TAG}
      - -f
      - Dockerfile.agent
      - .
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - asia-northeast1-docker.pkg.dev/$PROJECT_ID/driftscribe/payment-demo:${_TAG}
      - -f
      - demo/Dockerfile
      - demo
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - asia-northeast1-docker.pkg.dev/$PROJECT_ID/driftscribe/driftscribe-reader:${_TAG}
      - -f
      - workers/reader/Dockerfile
      # Build context is the repo root so COPY driftscribe_lib/ resolves —
      # the worker's Dockerfile lives at workers/reader/Dockerfile but
      # depends on driftscribe_lib/ at the project root.
      - .
  - name: gcr.io/cloud-builders/docker
    args: ['push', 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/driftscribe/driftscribe-agent:${_TAG}']
  - name: gcr.io/cloud-builders/docker
    args: ['push', 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/driftscribe/payment-demo:${_TAG}']
  - name: gcr.io/cloud-builders/docker
    args: ['push', 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/driftscribe/driftscribe-reader:${_TAG}']

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - payment-demo
      - --image=asia-northeast1-docker.pkg.dev/$PROJECT_ID/driftscribe/payment-demo:${_TAG}
      - --region=asia-northeast1
      - --allow-unauthenticated
      - --min-instances=0
      - --max-instances=1
      - --concurrency=1
      - --set-env-vars=PAYMENT_MODE=mock,FEATURE_NEW_CHECKOUT=false

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - driftscribe-agent
      - --image=asia-northeast1-docker.pkg.dev/$PROJECT_ID/driftscribe/driftscribe-agent:${_TAG}
      - --region=asia-northeast1
      # SECURITY: live demo runs DRY_RUN=true + --allow-unauthenticated
      # (Option C from Phase 8 plan). Flip to DRY_RUN=false ONLY after adding
      # the X-DriftScribe-Token guard (Option A) or removing
      # --allow-unauthenticated in favor of IAM-authenticated invocation
      # (Option B).
      - --allow-unauthenticated
      - --min-instances=0
      - --max-instances=1
      - --concurrency=1
      # USE_ADK is FALSE by default so a fresh `gcloud builds submit` doesn't
      # silently restore the ADK path before the operator has confirmed Gemini
      # quota. Flip on a running revision with:
      #   gcloud run services update driftscribe-agent --update-env-vars=USE_ADK=true
      # ...after verifying https://ai.studio/projects credit balance, then run
      # the Beat C smoke test before recording the demo video.
      - --set-env-vars=DRY_RUN=true,GCP_PROJECT=$PROJECT_ID,TARGET_SERVICE=payment-demo,TARGET_REGION=asia-northeast1,GITHUB_REPO=adi-prasetyo/driftscribe,USE_ADK=false,DEBUG_CONFIG_URL=https://payment-demo-u272wv52kq-an.a.run.app/debug/config
      # DRIFTSCRIBE_TOKEN (Phase 11.1) gates /recheck via the X-DriftScribe-Token
      # header. The `coordinator-shared-token` secret MUST exist in Secret
      # Manager BEFORE the first build that includes this line — Cloud Run
      # validates secret references at deploy time and fails the revision with
      # `INVALID_ARGUMENT: Revision is not ready... Secret not found` if the
      # resource is missing. The 503 fail-closed in agent/auth.py only kicks in
      # if DRIFTSCRIBE_TOKEN is empty at runtime (e.g., an operator removed
      # this --set-secrets line). See docs/architecture/multi-agent-design.md §2.
      - --set-secrets=GITHUB_TOKEN=github-pat:latest,GOOGLE_API_KEY=gemini-api-key:latest,DRIFTSCRIBE_TOKEN=coordinator-shared-token:latest

  # Reader Agent (Phase 11.3) — worker #1 of 4. Read-only state extraction.
  # Layer 1: reader-agent-sa has only roles/run.viewer at the project.
  # Layer 3: --no-allow-unauthenticated forces ID-token auth; the worker
  # ALSO enforces an in-app allowlist via driftscribe_lib.auth.verify_caller.
  #
  # Two-step OWN_URL pattern: Cloud Run assigns the service URL during the
  # first deploy, but verify_caller() needs to know it ahead of time to
  # validate the audience claim. We bootstrap with a placeholder URL on the
  # initial deploy step, then immediately follow up with a gcloud `services
  # update` that reads the assigned URL and writes it back into OWN_URL.
  # Both steps run in EVERY build, so subsequent redeploys keep OWN_URL in
  # sync even if the URL ever rotates (e.g., region migration).
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - driftscribe-reader
      - --image=asia-northeast1-docker.pkg.dev/$PROJECT_ID/driftscribe/driftscribe-reader:${_TAG}
      - --region=asia-northeast1
      - --no-allow-unauthenticated
      - --service-account=reader-agent-sa@$PROJECT_ID.iam.gserviceaccount.com
      - --min-instances=0
      - --max-instances=1
      - --concurrency=1
      # OWN_URL placeholder — overwritten by the next step in this same
      # build. If the next step fails, the revision will not serve requests
      # successfully (verify_caller rejects every audience), which is the
      # desired fail-closed behavior.
      - --set-env-vars=GCP_PROJECT=$PROJECT_ID,TARGET_SERVICE=payment-demo,TARGET_REGION=asia-northeast1,OWN_URL=https://placeholder.invalid,ALLOWED_CALLERS=driftscribe-agent@$PROJECT_ID.iam.gserviceaccount.com

  # Post-deploy: read the assigned URL and write it back into OWN_URL.
  # `gcloud run services update --update-env-vars` patches the env block
  # without re-rolling the image, so it's cheap and atomic.
  #
  # Shell `$` references are doubled (`$$`) so Cloud Build's pre-processor
  # leaves them alone — Cloud Build expands `$VAR` and `${VAR}` against its
  # own substitutions namespace before the bash script runs.
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        URL=$$(gcloud run services describe driftscribe-reader \
          --region=asia-northeast1 --format='value(status.url)')
        if [ -z "$${URL}" ] || [ "$${URL}" = "https://placeholder.invalid" ]; then
          echo "ERROR: Could not resolve driftscribe-reader URL" >&2
          exit 1
        fi
        echo "Setting OWN_URL=$${URL} on driftscribe-reader"
        gcloud run services update driftscribe-reader \
          --region=asia-northeast1 \
          --update-env-vars=OWN_URL=$${URL}

images:
  - asia-northeast1-docker.pkg.dev/$PROJECT_ID/driftscribe/driftscribe-agent:${_TAG}
  - asia-northeast1-docker.pkg.dev/$PROJECT_ID/driftscribe/payment-demo:${_TAG}
  - asia-northeast1-docker.pkg.dev/$PROJECT_ID/driftscribe/driftscribe-reader:${_TAG}
